<!DOCTYPE html>
{% if session is defined and session.theme %}
<html lang="en" class="den-bear-chat-page theme-{{ session.theme }}">
{% else %}
<html lang="en" class="den-bear-chat-page">
{% endif %}
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ bear_name | e }} — Chat</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="den-wrap">
    <div class="den-toolbar">
      <a href="/">Home</a>
      · <a href="/bear/{{ bear_slug | e }}/details">Bear details</a>
      <span class="den-bear-meta">Chatting with <strong>{{ bear_name | e }}</strong> (<code>{{ bear_slug | e }}</code>)</span>
    </div>
    <p id="err" class="den-err" hidden></p>
    <div id="chat-wrap">
      <deep-chat id="chat"></deep-chat>
    </div>
  </div>
  <script type="module" src="/assets/deep-chat/deepChat.bundle.js"></script>
  <script>
    var BEAR_ID   = "{{ bear_id | e }}";
    var BEAR_NAME = "{{ bear_name | e }}";
    var errEl = document.getElementById('err');
    /** Page size for Letta `GET …/messages` (newest page first; scroll up loads older). */
    var DEN_HISTORY_PAGE = 50;
    var historyNextBefore = null;

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.hidden = false;
    }

    function cv(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    /**
     * Resolve a design token to a computed CSS value for Deep Chat's style API.
     * getPropertyValue on :root returns raw `calc(var(...))` for many `--chat-*` tokens; the
     * component applies strings inside Shadow DOM where those vars may not resolve, which can
     * zero out the text input. Applying `prop: var(name)` on a light-DOM probe yields px/rem.
     */
    function cvComputed(name, prop) {
      var p = document.getElementById('den-cv-probe');
      if (!p) {
        p = document.createElement('div');
        p.id = 'den-cv-probe';
        p.setAttribute('aria-hidden', 'true');
        p.style.cssText =
          'box-sizing:border-box;position:absolute!important;left:-9999px!important;top:0!important;' +
          'visibility:hidden!important;pointer-events:none!important;margin:0!important;padding:0!important;' +
          'border:none!important;width:auto!important;height:auto!important;font-size:16px!important;' +
          'line-height:normal!important;font-family:inherit!important;';
        document.body.appendChild(p);
      }
      p.style.setProperty(prop, 'var(' + name + ')');
      var v = getComputedStyle(p).getPropertyValue(prop).trim();
      p.style.removeProperty(prop);
      return v;
    }

    function escapeHtml(t) {
      return String(t)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /** Letta sometimes wraps the real payload in `contents` (same pattern as `error_message`). */
    function lettaInnerForStream(obj) {
      if (!obj || typeof obj !== 'object') return obj;
      if (obj.contents && typeof obj.contents === 'object' && obj.contents.message_type) {
        return obj.contents;
      }
      return obj;
    }

    /** HTML ai-bubble: single-line horizontal scroll; Expand toggles full wrapped text (plain only — no Markdown in html). */
    function buildReasoningHtml(fullText) {
      var esc = escapeHtml(fullText);
      return (
        '<div class="den-reasoning-wrap" data-den-reasoning="1">' +
          '<div class="den-reasoning-head">' +
            '<span class="den-reasoning-kicker">Thinking</span>' +
            '<div class="den-reasoning-scroll">' +
              esc +
            '</div>' +
            '<button type="button" class="den-reasoning-toggle" aria-expanded="false">Expand</button>' +
          '</div>' +
        '</div>'
      );
    }

    /**
     * Deep Chat `loadHistory`: first call loads the newest window; when the returned array ends
     * with `false`, scrolling to the top requests older messages (see deepchat.dev/docs/interceptors).
     */
    function loadDenHistory(index) {
      if (!BEAR_ID) {
        return Promise.resolve([]);
      }
      if (index === 0) {
        historyNextBefore = null;
      } else if (!historyNextBefore) {
        return Promise.resolve([]);
      }
      var params = new URLSearchParams();
      params.set('bear_id', BEAR_ID);
      params.set('limit', String(DEN_HISTORY_PAGE));
      if (index > 0 && historyNextBefore) {
        params.set('before', historyNextBefore);
      }
      return fetch('/v1/chat/history?' + params.toString(), {
        credentials: 'same-origin',
      }).then(function (response) {
        if (response.status === 401) {
          window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
          return { messages: [], has_more: false, next_before: null };
        }
        if (!response.ok) {
          return response.text().then(function (t) {
            throw new Error(t || 'HTTP ' + response.status);
          });
        }
        return response.json();
      }).then(function (data) {
        if (!data || typeof data !== 'object') {
          return [];
        }
        historyNextBefore = data.next_before || null;
        var out = (data.messages || [])
          .filter(function (m) {
            return m && typeof m === 'object' && (m.role === 'user' || m.role === 'ai');
          })
          .map(function (m) {
            return { role: m.role, text: String(m.text != null ? m.text : '') };
          });
        // Deep Chat expects `false` only after real messages; `[false]` alone can break the component.
        if (data.has_more && out.length > 0) {
          out.push(false);
        }
        return out;
      }).catch(function (err) {
        showErr(String(err.message || err));
        return [];
      });
    }

    function configureDenChat() {
      var chat = document.getElementById('chat');
      var pg  = cv('--page-color');
      var fg  = cv('--text-color');
      var brd = cv('--border-color');
      var met = cv('--meta-color');
      var srf = cv('--surface-color');
      var tln = cv('--thin-line-unit');
      var bubblePad =
        cvComputed('--chat-bubble-padding-block', 'padding-top') +
        ' ' +
        cvComputed('--chat-bubble-padding-inline', 'padding-left');
      var lh = cvComputed('--chat-line-height', 'line-height');
      var bodyFont = cv('--body-font-family');
      var border1 = tln + ' solid ' + brd;
      var submitScale = 'scale(' + cv('--chat-submit-button-scale') + ')';

      chat.style.cssText =
        'position:absolute; top:0; left:0; width:100%; height:100%;' +
        ' box-sizing:border-box; border:solid var(--thin-line-unit) var(--border-color);' +
        ' border-radius:0; font-family: var(--body-font-family);' +
        ' font-size: var(--chat-font-size); background: var(--page-color);';

      chat.avatars = {
        ai:   { src: '', styles: { avatar: { display: 'none' } } },
        user: { src: '', styles: { avatar: { display: 'none' } } },
      };

      chat.names = false;

      chat.messageStyles = {
        default: {
          shared: {
            bubble: {
              borderRadius: '0',
              padding: bubblePad,
              maxWidth: '100%',
              lineHeight: lh,
              color: fg,
            },
          },
          ai: {
            outerContainer: { justifyContent: 'flex-start' },
            bubble: { backgroundColor: srf },
          },
          user: {
            outerContainer: { justifyContent: 'flex-end' },
            bubble: { backgroundColor: pg, border: border1 },
          },
        },
        loading: {
          message: {
            styles: {
              outerContainer: { justifyContent: 'flex-start' },
              bubble: { backgroundColor: srf, color: met, borderRadius: '0', padding: bubblePad },
            },
          },
        },
      };

      chat.textInput = {
        styles: {
          container: {
            width: '100%',
            margin: '0',
            border: 'unset',
            borderTop: border1,
            borderRadius: '0px',
            boxShadow: 'unset',
            backgroundColor: pg,
            color: fg,
          },
          text: {
            color: fg,
            fontFamily: bodyFont,
            fontSize: cvComputed('--chat-input-font-size', 'font-size'),
            paddingTop: cvComputed('--chat-input-pad-top', 'padding-top'),
            paddingBottom: cvComputed('--chat-input-pad-bottom', 'padding-bottom'),
            paddingLeft: cvComputed('--chat-input-pad-left', 'padding-left'),
            paddingRight: cvComputed('--chat-input-pad-right', 'padding-right'),
          },
          focus: {},
        },
        placeholder: { text: 'Message your bear\u2026', style: { color: met } },
      };

      chat.submitButtonStyles = {
        submit:  { container: { default: { transform: submitScale, marginBottom: cvComputed('--chat-submit-nudge-y', 'margin-bottom'), marginRight: cvComputed('--chat-submit-margin-right', 'margin-right') } } },
        loading: { container: { default: { transform: submitScale, marginBottom: cvComputed('--chat-submit-nudge-y', 'margin-bottom'), marginRight: cvComputed('--chat-submit-margin-right', 'margin-right') } } },
        stop:    { container: { default: { transform: submitScale, marginBottom: cvComputed('--chat-submit-nudge-y', 'margin-bottom'), marginRight: cvComputed('--chat-submit-margin-right', 'margin-right') } } },
      };

      chat.inputAreaStyle = { backgroundColor: pg };

      chat.auxiliaryStyle =
        '::-webkit-scrollbar{width:var(--chat-scrollbar-size)}' +
        '::-webkit-scrollbar-thumb{background:var(--meta-color);border-radius:0}' +
        '::-webkit-scrollbar-track{background:transparent}' +
        '#messages{padding-top:var(--chat-messages-padding-top)!important}' +
        '.den-reasoning-wrap{font-size:smaller;color:inherit;opacity:0.92}' +
        '.den-reasoning-head{display:flex;align-items:center;gap:calc(var(--spacing-unit) * 0.9);min-width:0}' +
        '.den-reasoning-kicker{flex:0 0 auto;font-variant:small-caps;letter-spacing:0.06em;font-size:smaller;opacity:0.8}' +
        '.den-reasoning-scroll{flex:1 1 auto;min-width:0;overflow-x:auto;overflow-y:hidden;max-height:calc(1em * var(--chat-line-height));line-height:var(--chat-line-height);font-family:var(--data-font-family),ui-monospace,monospace;font-size:smaller;white-space:nowrap;-webkit-overflow-scrolling:touch}' +
        '.den-reasoning-wrap.den-reasoning-expanded .den-reasoning-scroll{white-space:pre-wrap;overflow-x:visible;overflow-y:auto;max-height:calc(var(--spacing-unit) * 36)}' +
        '.den-reasoning-toggle{flex:0 0 auto;margin:0;padding:calc(var(--spacing-unit) * 0.24) calc(var(--spacing-unit) * 0.7);border:none;background:transparent;color:inherit;opacity:0.72;cursor:pointer;font:inherit;font-size:smaller;text-decoration:underline;text-underline-offset:calc(var(--thin-line-unit) * 2)}' +
        '.den-reasoning-toggle:hover{opacity:1}';

      chat.remarkable = { html: false, breaks: true };

      chat.connect = { handler: lettaSseHandler, stream: true };

      chat.loadHistory = loadDenHistory;

      chat.addEventListener('click', function (ev) {
        var path = typeof ev.composedPath === 'function' ? ev.composedPath() : [ev.target];
        var btn = null;
        for (var i = 0; i < path.length; i++) {
          var n = path[i];
          if (n && n.nodeType === 1 && n.classList && n.classList.contains('den-reasoning-toggle')) {
            btn = n;
            break;
          }
        }
        if (!btn) return;
        var w = btn.closest('[data-den-reasoning]');
        if (!w) return;
        var on = !w.classList.contains('den-reasoning-expanded');
        w.classList.toggle('den-reasoning-expanded', on);
        btn.setAttribute('aria-expanded', on ? 'true' : 'false');
        btn.textContent = on ? 'Collapse' : 'Expand';
      });
    }

    /** Map one Letta SSE JSON object to `{ error: string }` or null. */
    function lettaStreamEventErrorSignal(obj) {
      var inner = lettaInnerForStream(obj);
      if (!inner || inner.message_type !== 'error_message') return null;
      var lines = [];
      if (inner.error_type) lines.push('[' + String(inner.error_type) + ']');
      if (inner.message) lines.push(String(inner.message));
      if (inner.detail) lines.push(String(inner.detail));
      var msg = lines.length ? lines.join('\n\n') : 'An error occurred.';
      return { error: msg };
    }

    function lettaSseHandler(body, signals) {
      var userText = (body.messages || [])
        .filter(function (m) { return m.role === 'user'; })
        .map(function (m) { return m.text || ''; })
        .pop() || '';

      if (!BEAR_ID) { signals.onResponse({ error: 'Missing bear.' }); return; }
      errEl.hidden = true;

      var abortCtl = new AbortController();
      signals.stopClicked.listener = function () { abortCtl.abort(); };

      fetch('/v1/chat/send', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bear_id: BEAR_ID, message: userText }),
        signal: abortCtl.signal,
      }).then(function (response) {
        if (response.status === 401) {
          window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
          return;
        }
        if (!response.ok) {
          return response.text().then(function (t) {
            signals.onResponse({ error: t || 'HTTP ' + response.status });
          });
        }
        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var lineBuf = '';
        var reasoningFull = '';
        var hadReasoning = false;
        var assistantBuf = '';
        var assistantLastId = null;
        var NO_ID = '___den_letta_assistant_no_id___';
        signals.onOpen();

        function pump() {
          return reader.read().then(function (result) {
            if (result.done) { signals.onClose(); return; }
            lineBuf += decoder.decode(result.value, { stream: true });
            var nl;
            while ((nl = lineBuf.indexOf('\n')) >= 0) {
              var raw = lineBuf.slice(0, nl);
              lineBuf = lineBuf.slice(nl + 1);
              var line = raw.replace(/\r$/, '');
              if (!line.startsWith('data: ')) continue;
              var payload = line.slice(6).trim();
              if (payload === '' || payload === '[DONE]') continue;
              try { var obj = JSON.parse(payload); } catch (_) { continue; }
              var errSig = lettaStreamEventErrorSignal(obj);
              if (errSig) {
                signals.onResponse(errSig);
                continue;
              }
              var inner = lettaInnerForStream(obj);
              if (!inner || typeof inner !== 'object') continue;

              if (inner.message_type === 'reasoning_message') {
                var piece = '';
                if (typeof inner.reasoning === 'string') piece = inner.reasoning;
                else if (typeof inner.content === 'string') piece = inner.content;
                if (!piece) continue;
                var wasEmpty = reasoningFull.length === 0;
                reasoningFull += piece;
                hadReasoning = true;
                signals.onResponse({
                  html: buildReasoningHtml(reasoningFull),
                  role: 'ai',
                  overwrite: !wasEmpty,
                });
                continue;
              }

              if (inner.message_type === 'assistant_message' && typeof inner.content === 'string') {
                var aid =
                  inner.id != null && String(inner.id) !== '' ? String(inner.id) : null;
                var sameAssistant =
                  aid != null
                    ? aid === assistantLastId
                    : assistantLastId === NO_ID;
                if (!sameAssistant) {
                  assistantLastId = aid != null ? aid : NO_ID;
                  assistantBuf = inner.content;
                } else {
                  assistantBuf += inner.content;
                }
                signals.onResponse({
                  text: assistantBuf,
                  overwrite: hadReasoning || sameAssistant,
                });
                if (hadReasoning) hadReasoning = false;
              }
            }
            return pump();
          });
        }
        return pump();
      }).catch(function (x) {
        if (x.name === 'AbortError') {
          signals.onResponse({ text: '\n[stopped]' });
          signals.onClose();
        } else {
          signals.onResponse({ error: String(x.message || x) });
        }
      });
    }

    customElements.whenDefined('deep-chat').then(configureDenChat);
  </script>
</body>
</html>
