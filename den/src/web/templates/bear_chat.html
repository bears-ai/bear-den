<!DOCTYPE html>
<html lang="en" class="loquix-theme-dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ bear_name | e }} — Chat</title>
  <!-- Same-origin @loquix/core 0.1.2 (see assets/loquix/VERSION); dark theme needs .loquix-theme-dark on an ancestor. -->
  <link rel="stylesheet" href="/assets/loquix/variables.css" />
  <link rel="stylesheet" href="/assets/loquix/themes/dark.css" />
  <style>
    /* Loquix :host uses height:100%; percentage height needs a definite chain — without this
       the chat host often resolves to 0px while the toolbar (outside the component) still shows. */
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--loquix-canvas-bg, #0f172a);
      color: var(--loquix-fg-default, #e2e8f0);
      font-family: system-ui, sans-serif;
    }
    .den-loquix-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-width: 56rem;
      margin: 0 auto;
      padding: 1rem;
      width: 100%;
      box-sizing: border-box;
    }
    /* Host: explicit min block size so inner height:100% / flex chain can resolve (see below). */
    .den-loquix-wrap loquix-chat-container {
      flex: 1 1 auto;
      width: 100%;
      min-height: calc(100vh - 10rem);
      min-height: calc(100dvh - 10rem);
    }
    /*
     * Loquix slots live in a shadow column flex; the messages slot does not get flex-grow.
     * loquix-message-list's :host { flex:1 } only works when the parent is a flex container —
     * the slot is not, so the list collapses to 0×0 unless we give it a definite min-height here
     * (light-DOM rules still apply to slotted nodes).
     */
    .den-loquix-wrap loquix-chat-container > loquix-message-list {
      display: block;
      width: 100%;
      min-height: min(32rem, calc(100vh - 14rem));
      min-height: min(32rem, calc(100dvh - 14rem));
    }
    .den-loquix-wrap loquix-chat-container > loquix-chat-composer {
      display: block;
      width: 100%;
      min-height: 5.5rem;
    }
    .den-loquix-wrap loquix-chat-container > loquix-chat-header {
      display: block;
      width: 100%;
    }
    .den-toolbar { display: flex; gap: 1rem; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .den-toolbar a { color: #93c5fd; }
    .den-toolbar .den-bear-meta { font-size: 0.95rem; }
    .den-toolbar code { font-size: 0.85rem; }
    .den-err { color: #fca5a5; font-size: 0.9rem; margin: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="den-loquix-wrap">
    <div class="den-toolbar">
      <a href="/">Home</a>
      <span class="den-bear-meta">Chatting with <strong>{{ bear_name | e }}</strong> (<code>{{ bear_slug | e }}</code>)</span>
    </div>
    <p id="err" class="den-err" hidden></p>
    <loquix-chat-container layout="full">
      <loquix-chat-header slot="header" agent-name="{{ bear_name | e }}"></loquix-chat-header>
      <loquix-message-list slot="messages" id="msg-list"></loquix-message-list>
      <loquix-chat-composer slot="composer" id="composer" placeholder="Message your bear…"></loquix-chat-composer>
    </loquix-chat-container>
  </div>
  <script src="/assets/loquix/loquix.min.js"></script>
  <script src="/assets/loquix/loquix-register.js"></script>
  <script>
    const BEAR_ID = "{{ bear_id | e }}";
    const errEl = document.getElementById('err');
    const messageList = document.getElementById('msg-list');
    const composer = document.getElementById('composer');

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.hidden = false;
    }

    let abortCtl = null;

    /** Letta streams SSE (`data: {json}\\n`). Append visible assistant text only. */
    async function consumeLettaSseToAssistantMessage(reader, decoder, assistantContent) {
      let lineBuf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        lineBuf += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = lineBuf.indexOf('\n')) >= 0) {
          const raw = lineBuf.slice(0, nl);
          lineBuf = lineBuf.slice(nl + 1);
          const line = raw.replace(/\r$/, '');
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '' || payload === '[DONE]') continue;
          let obj;
          try {
            obj = JSON.parse(payload);
          } catch {
            continue;
          }
          if (obj.message_type === 'assistant_message' && typeof obj.content === 'string') {
            assistantContent.textContent += obj.content;
          }
        }
      }
    }

    document.addEventListener('loquix-submit', async function (e) {
      const content = e.detail.content;
      if (!BEAR_ID) {
        showErr('Missing bear.');
        return;
      }
      errEl.hidden = true;

      const userMsg = document.createElement('loquix-message-item');
      userMsg.setAttribute('role', 'user');
      userMsg.setAttribute('status', 'complete');
      const userContent = document.createElement('loquix-message-content');
      userContent.textContent = content;
      userMsg.appendChild(userContent);
      messageList.appendChild(userMsg);

      const assistantMsg = document.createElement('loquix-message-item');
      assistantMsg.setAttribute('role', 'assistant');
      assistantMsg.setAttribute('status', 'streaming');
      const assistantContent = document.createElement('loquix-message-content');
      assistantContent.setAttribute('streaming-cursor', 'caret');
      assistantMsg.appendChild(assistantContent);
      messageList.appendChild(assistantMsg);

      composer.setAttribute('streaming', '');
      abortCtl = new AbortController();

      try {
        const response = await fetch('/v1/chat/send', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bear_id: BEAR_ID, message: content }),
          signal: abortCtl.signal,
        });
        if (response.status === 401) {
          window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
          return;
        }
        if (!response.ok) {
          const t = await response.text();
          throw new Error(t || ('HTTP ' + response.status));
        }
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        await consumeLettaSseToAssistantMessage(reader, decoder, assistantContent);
      } catch (x) {
        if (x.name === 'AbortError') {
          assistantContent.textContent += '\n[stopped]';
        } else {
          showErr(String(x.message || x));
        }
      } finally {
        assistantContent.removeAttribute('streaming-cursor');
        assistantMsg.setAttribute('status', 'complete');
        composer.removeAttribute('streaming');
        abortCtl = null;
      }
    });

    document.addEventListener('loquix-stop', function () {
      if (abortCtl) abortCtl.abort();
    });
  </script>
</body>
</html>
