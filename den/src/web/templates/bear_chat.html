<!DOCTYPE html>
{% if session is defined and session.theme %}
<html lang="en" class="theme-{{ session.theme }}">
{% else %}
<html lang="en">
{% endif %}
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ bear_name | e }} — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --page-color:   #EEEEEE;
      --text-color:   #121212;
      --border-color: #121212;
      --accent-color: #cc11dd;
      --meta-color:   #aaaaaa;
      --error-color:  #CC0000;
      --surface-color:#DDDDDD;
    }
    html.theme-dark {
      --page-color:   #121212;
      --text-color:   #DDDDDD;
      --border-color: #DDDDDD;
      --accent-color: #cc11dd;
      --meta-color:   #aaaaaa;
      --error-color:  #CC0000;
      --surface-color:#1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --page-color:   #121212;
        --text-color:   #DDDDDD;
        --border-color: #DDDDDD;
        --surface-color:#1a1a1a;
      }
      html.theme-light {
        --page-color:   #EEEEEE;
        --text-color:   #121212;
        --border-color: #121212;
        --surface-color:#DDDDDD;
      }
    }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--page-color);
      color: var(--text-color);
      font-family: "Geist", sans-serif;
    }
    .den-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-width: 56rem;
      margin: 0 auto;
      padding: 1rem;
      width: 100%;
      box-sizing: border-box;
    }
    .den-toolbar {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .den-toolbar a { color: var(--text-color); text-decoration: underline; }
    .den-toolbar a:hover { color: var(--accent-color); }
    .den-toolbar .den-bear-meta { font-size: 0.95rem; }
    .den-toolbar code { font-size: 0.85rem; font-family: "Geist Mono", monospace; }
    .den-err { color: var(--error-color); font-size: 0.9rem; margin: 0.5rem 0; }
    #chat-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
  </style>
</head>
<body>
  <div class="den-wrap">
    <div class="den-toolbar">
      <a href="/">Home</a>
      <span class="den-bear-meta">Chatting with <strong>{{ bear_name | e }}</strong> (<code>{{ bear_slug | e }}</code>)</span>
    </div>
    <p id="err" class="den-err" hidden></p>
    <div id="chat-wrap">
      <deep-chat id="chat"></deep-chat>
    </div>
  </div>
  <script type="module" src="/assets/deep-chat/deepChat.bundle.js"></script>
  <script>
    var BEAR_ID   = "{{ bear_id | e }}";
    var BEAR_NAME = "{{ bear_name | e }}";
    var errEl = document.getElementById('err');

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.hidden = false;
    }

    function cv(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function configureDenChat() {
      var chat = document.getElementById('chat');
      var pg  = cv('--page-color');
      var fg  = cv('--text-color');
      var brd = cv('--border-color');
      var acc = cv('--accent-color');
      var met = cv('--meta-color');
      var srf = cv('--surface-color');

      chat.style.cssText =
        'position:absolute; top:0; left:0; width:100%; height:100%;' +
        ' box-sizing:border-box; border:solid 1px ' + brd +
        '; border-radius:0; font-family:"Geist",sans-serif;' +
        ' font-size:0.9375rem; background:' + pg + ';';

      chat.avatars = {
        ai:   { src: '', styles: { avatar: { display: 'none' } } },
        user: { src: '', styles: { avatar: { display: 'none' } } },
      };

      chat.names = false;

      chat.messageStyles = {
        default: {
          shared: {
            bubble: {
              borderRadius: '0',
              padding: '10px 14px',
              maxWidth: '100%',
              lineHeight: '1.6',
              color: fg,
            },
          },
          ai: {
            outerContainer: { justifyContent: 'flex-start' },
            bubble: { backgroundColor: srf },
          },
          user: {
            outerContainer: { justifyContent: 'flex-end' },
            bubble: { backgroundColor: pg, border: '1px solid ' + brd },
          },
        },
        loading: {
          message: {
            styles: {
              outerContainer: { justifyContent: 'flex-start' },
              bubble: { backgroundColor: srf, color: met, borderRadius: '0', padding: '10px 14px' },
            },
          },
        },
      };

      chat.textInput = {
        styles: {
          container: {
            width: '100%',
            margin: '0',
            border: 'unset',
            borderTop: '1px solid ' + brd,
            borderRadius: '0px',
            boxShadow: 'unset',
            backgroundColor: pg,
            color: fg,
          },
          text: {
            color: fg,
            fontFamily: "'Geist', sans-serif",
            fontSize: '1.05em',
            paddingTop: '11px',
            paddingBottom: '13px',
            paddingLeft: '12px',
            paddingRight: '2.4em',
          },
          focus: {},
        },
        placeholder: { text: 'Message your bear\u2026', style: { color: met } },
      };

      chat.submitButtonStyles = {
        submit:  { container: { default: { transform: 'scale(1.21)', marginBottom: '-3px', marginRight: '0.4em' } } },
        loading: { container: { default: { transform: 'scale(1.21)', marginBottom: '-3px', marginRight: '0.4em' } } },
        stop:    { container: { default: { transform: 'scale(1.21)', marginBottom: '-3px', marginRight: '0.4em' } } },
      };

      chat.inputAreaStyle = { backgroundColor: pg };

      chat.auxiliaryStyle =
        '::-webkit-scrollbar{width:6px}' +
        '::-webkit-scrollbar-thumb{background:' + met + ';border-radius:0}' +
        '::-webkit-scrollbar-track{background:transparent}' +
        '#messages{padding-top:1rem !important}';

      chat.remarkable = { html: false, breaks: true };

      chat.connect = { handler: lettaSseHandler, stream: true };
    }

    function lettaSseHandler(body, signals) {
      var userText = (body.messages || [])
        .filter(function (m) { return m.role === 'user'; })
        .map(function (m) { return m.text || ''; })
        .pop() || '';

      if (!BEAR_ID) { signals.onResponse({ error: 'Missing bear.' }); return; }
      errEl.hidden = true;

      var abortCtl = new AbortController();
      signals.stopClicked.listener = function () { abortCtl.abort(); };

      fetch('/v1/chat/send', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bear_id: BEAR_ID, message: userText }),
        signal: abortCtl.signal,
      }).then(function (response) {
        if (response.status === 401) {
          window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
          return;
        }
        if (!response.ok) {
          return response.text().then(function (t) {
            signals.onResponse({ error: t || 'HTTP ' + response.status });
          });
        }
        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var lineBuf = '';
        signals.onOpen();

        function pump() {
          return reader.read().then(function (result) {
            if (result.done) { signals.onClose(); return; }
            lineBuf += decoder.decode(result.value, { stream: true });
            var nl;
            while ((nl = lineBuf.indexOf('\n')) >= 0) {
              var raw = lineBuf.slice(0, nl);
              lineBuf = lineBuf.slice(nl + 1);
              var line = raw.replace(/\r$/, '');
              if (!line.startsWith('data: ')) continue;
              var payload = line.slice(6).trim();
              if (payload === '' || payload === '[DONE]') continue;
              try { var obj = JSON.parse(payload); } catch (_) { continue; }
              if (obj.message_type === 'assistant_message' && typeof obj.content === 'string') {
                signals.onResponse({ text: obj.content });
              }
            }
            return pump();
          });
        }
        return pump();
      }).catch(function (x) {
        if (x.name === 'AbortError') {
          signals.onResponse({ text: '\n[stopped]' });
          signals.onClose();
        } else {
          signals.onResponse({ error: String(x.message || x) });
        }
      });
    }

    customElements.whenDefined('deep-chat').then(configureDenChat);
  </script>
</body>
</html>
