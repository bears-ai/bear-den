{% extends "base.html" %}

{% block title %}{{ bear_name | e }}{% endblock %}

{% block subnav %}
<li>
  <label for="den-conv">Conversation</label>
  <select id="den-conv" aria-label="Conversation"></select>
</li>
<li><a class="button-link" href="/bear/{{ bear_slug | e }}/details">Bear details</a></li>
{% endblock %}

{% block head %}
{{ super() }}
<link rel="modulepreload" href="/assets/deep-chat/deepChat.bundle.js" />
<script type="module" src="/assets/deep-chat/deepChat.bundle.js"></script>
{% endblock %}

{% block content %}
<div class="den-wrap">
    <p id="err" class="den-err" hidden></p>
    <div id="chat-wrap">
        <deep-chat id="chat"></deep-chat>
    </div>
</div>
<script>
    var BEAR_ID   = "{{ bear_id | e }}";
    var BEAR_NAME = "{{ bear_name | e }}";
    /** Letta conversation id (`default` = agent main thread, or `conv-…`). */
    var CONVERSATION_ID = (function () {
      var p = new URLSearchParams(window.location.search).get('conversation_id');
      return p && p.trim() ? p.trim() : 'default';
    })();
    /**
     * Show raw `<system-reminder>…</system-reminder>` in the chat only when
     * `?debug=true` or `?debug=verbose` (no UI toggle).
     */
    var DEN_CHAT_DEBUG_VERBOSE = (function () {
      var q = new URLSearchParams(window.location.search);
      var v = (q.get('debug') || '').trim().toLowerCase();
      return v === 'true' || v === 'verbose';
    })();
    var errEl = document.getElementById('err');
    /** Page size for Letta `GET …/messages` (newest page first; scroll up loads older). */
    var DEN_HISTORY_PAGE = 50;
    var historyNextBefore = null;

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.hidden = false;
    }

    function cv(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    /**
     * Resolve `--chat-*` tokens to computed lengths for Deep Chat (see cvComputed rationale
     * in prior commits). Batches setProperty + getComputedStyle to avoid many forced layouts.
     */
    function resolveDeepChatLayoutTokens() {
      var p = document.getElementById('den-cv-probe');
      if (!p) {
        p = document.createElement('div');
        p.id = 'den-cv-probe';
        p.setAttribute('aria-hidden', 'true');
        p.style.cssText =
          'box-sizing:border-box;position:absolute!important;left:-9999px!important;top:0!important;' +
          'visibility:hidden!important;pointer-events:none!important;margin:0!important;padding:0!important;' +
          'border:none!important;width:auto!important;height:auto!important;font-size:16px!important;' +
          'line-height:normal!important;font-family:inherit!important;';
        document.body.appendChild(p);
      }
      function readBatch(setters, propNames) {
        var i;
        for (i = 0; i < setters.length; i++) {
          p.style.setProperty(setters[i][0], 'var(' + setters[i][1] + ')');
        }
        var cs = getComputedStyle(p);
        var out = {};
        for (i = 0; i < propNames.length; i++) {
          out[propNames[i]] = cs.getPropertyValue(propNames[i]).trim();
        }
        for (i = 0; i < setters.length; i++) {
          p.style.removeProperty(setters[i][0]);
        }
        return out;
      }

      var input = readBatch(
        [
          ['padding-top', '--chat-input-pad-top'],
          ['padding-bottom', '--chat-input-pad-bottom'],
          ['padding-left', '--chat-input-pad-left'],
          ['padding-right', '--chat-input-pad-right'],
          ['font-size', '--chat-input-font-size'],
        ],
        ['padding-top', 'padding-bottom', 'padding-left', 'padding-right', 'font-size']
      );

      var bubble = readBatch(
        [
          ['padding-top', '--chat-bubble-padding-block'],
          ['padding-left', '--chat-bubble-padding-inline'],
          ['line-height', '--chat-line-height'],
        ],
        ['padding-top', 'padding-left', 'line-height']
      );

      var submit = readBatch(
        [
          ['margin-bottom', '--chat-submit-nudge-y'],
          ['margin-right', '--chat-submit-margin-right'],
        ],
        ['margin-bottom', 'margin-right']
      );

      return {
        bubblePad: bubble['padding-top'] + ' ' + bubble['padding-left'],
        lh: bubble['line-height'],
        inputFont: input['font-size'],
        inputPadT: input['padding-top'],
        inputPadB: input['padding-bottom'],
        inputPadL: input['padding-left'],
        inputPadR: input['padding-right'],
        submitMb: submit['margin-bottom'],
        submitMr: submit['margin-right'],
      };
    }

    function escapeHtml(t) {
      return String(t)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /** Strip model-injected `<system-reminder>…</system-reminder>` blocks from visible text. */
    function stripSystemReminderBlocks(text) {
      if (DEN_CHAT_DEBUG_VERBOSE || typeof text !== 'string') return text;
      var s = text.replace(/<system-reminder\b[^>]*>[\s\S]*?<\/system-reminder>/gi, '');
      var partial = /<system-reminder\b[^>]*$/i;
      var m = s.match(partial);
      if (m && m.index != null) s = s.slice(0, m.index);
      return s;
    }

    function escapeHtmlWithBreaks(s) {
      var n = String(s).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      return escapeHtml(n).replace(/\n/g, '<br>');
    }

    /**
     * When `?debug=true|verbose`, wrap each `<system-reminder>…</system-reminder>` in a collapsed
     * `<details>` (meta-colored); plain segments keep normal bubble color.
     */
    function buildInterleavedSystemReminderHtml(raw) {
      var parts = [];
      var lastIndex = 0;
      var re = /<system-reminder\b[^>]*>([\s\S]*?)<\/system-reminder>/gi;
      var m;
      while ((m = re.exec(raw)) !== null) {
        if (m.index > lastIndex) {
          parts.push(
            '<span class="den-assistant-plain">' +
              escapeHtmlWithBreaks(raw.slice(lastIndex, m.index)) +
              '</span>'
          );
        }
        parts.push(
          '<details class="den-system-reminder">' +
            '<summary class="den-system-reminder-summary">System reminder</summary>' +
            '<div class="den-system-reminder-body">' +
              escapeHtmlWithBreaks(m[1]) +
            '</div>' +
          '</details>'
        );
        lastIndex = re.lastIndex;
      }
      var tail = raw.slice(lastIndex);
      var partial = /<system-reminder\b[^>]*$/i;
      var pm = tail.match(partial);
      if (pm) tail = tail.slice(0, pm.index);
      parts.push('<span class="den-assistant-plain">' + escapeHtmlWithBreaks(tail) + '</span>');
      return parts.join('');
    }

    function formatAssistantDebugHtml(raw) {
      return '<div class="den-assistant-html">' + buildInterleavedSystemReminderHtml(raw) + '</div>';
    }

    /** Letta sometimes wraps the real payload in `contents` (same pattern as `error_message`). */
    function lettaInnerForStream(obj) {
      if (!obj || typeof obj !== 'object') return obj;
      if (obj.contents && typeof obj.contents === 'object' && obj.contents.message_type) {
        return obj.contents;
      }
      return obj;
    }

    /**
     * Markdown for the live stream only. Deep Chat forbids mixing `{ html: … }` (reasoning) and
     * `{ text: … }` (assistant) in one streamed bubble — assistant replies were dropped after Thinking.
     * Use `text` for both; remarkable renders **Thinking** + body.
     */
    function buildReasoningMarkdown(fullText) {
      var body;
      if (DEN_CHAT_DEBUG_VERBOSE) {
        body = fullText;
      } else {
        body = stripSystemReminderBlocks(fullText);
      }
      return '**Thinking**\n\n' + body;
    }

    /** Letta may send `content` as a string or structured parts (same idea as Code SDK `extractTextFromContent`). */
    function assistantChunkText(inner) {
      var c = inner.content;
      if (typeof c === 'string') return c;
      if (Array.isArray(c)) {
        var pieces = [];
        var j;
        for (j = 0; j < c.length; j++) {
          var part = c[j];
          if (typeof part === 'string') pieces.push(part);
          else if (part && typeof part === 'object' && typeof part.text === 'string') pieces.push(part.text);
        }
        return pieces.join('');
      }
      if (c && typeof c === 'object' && typeof c.text === 'string') return c.text;
      return '';
    }

    /**
     * Deep Chat `loadHistory`: first call loads the newest window; when the returned array ends
     * with `false`, scrolling to the top requests older messages (see deepchat.dev/docs/interceptors).
     */
    function loadDenHistory(index) {
      if (!BEAR_ID) {
        return Promise.resolve([]);
      }
      if (index === 0) {
        historyNextBefore = null;
      } else if (!historyNextBefore) {
        return Promise.resolve([]);
      }
      var params = new URLSearchParams();
      params.set('bear_id', BEAR_ID);
      params.set('conversation_id', CONVERSATION_ID);
      params.set('limit', String(DEN_HISTORY_PAGE));
      if (index > 0 && historyNextBefore) {
        params.set('before', historyNextBefore);
      }
      return fetch('/v1/chat/history?' + params.toString(), {
        credentials: 'same-origin',
      }).then(function (response) {
        if (response.status === 401) {
          window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
          return { messages: [], has_more: false, next_before: null };
        }
        if (!response.ok) {
          return response.text().then(function (t) {
            throw new Error(t || 'HTTP ' + response.status);
          });
        }
        return response.json();
      }).then(function (data) {
        if (!data || typeof data !== 'object') {
          return [];
        }
        historyNextBefore = data.next_before || null;
        var out = (data.messages || [])
          .filter(function (m) {
            return m && typeof m === 'object' && (m.role === 'user' || m.role === 'ai');
          })
          .map(function (m) {
            var t = String(m.text != null ? m.text : '');
            if (m.role !== 'ai') return { role: m.role, text: t };
            if (DEN_CHAT_DEBUG_VERBOSE && /<system-reminder/i.test(t)) {
              return { role: 'ai', html: formatAssistantDebugHtml(t) };
            }
            return { role: 'ai', text: stripSystemReminderBlocks(t) };
          });
        // Deep Chat expects `false` only after real messages; `[false]` alone can break the component.
        if (data.has_more && out.length > 0) {
          out.push(false);
        }
        return out;
      }).catch(function (err) {
        showErr(String(err.message || err));
        return [];
      });
    }

    function configureDenChat() {
      var chat = document.getElementById('chat');
      var tok = resolveDeepChatLayoutTokens();
      var pg  = cv('--page-color');
      var ff  = cv('--field-fill-color');
      var fg  = cv('--text-color');
      var brd = cv('--border-color');
      var met = cv('--meta-color');
      var srf = cv('--surface-color');
      var tln = cv('--thin-line-unit');
      var bubblePad = tok.bubblePad;
      var lh = tok.lh;
      var bodyFont = cv('--body-font-family');
      var border1 = tln + ' solid ' + brd;
      var submitScale = 'scale(' + cv('--chat-submit-button-scale') + ')';

      chat.style.cssText =
        'position:absolute; top:0; left:0; width:100%; height:100%;' +
        ' box-sizing:border-box; border:solid var(--thin-line-unit) var(--border-color);' +
        ' border-radius:0; font-family: var(--body-font-family);' +
        ' font-size: var(--chat-font-size); background: var(--page-color);';

      chat.avatars = {
        ai:   { src: '', styles: { avatar: { display: 'none' } } },
        user: { src: '', styles: { avatar: { display: 'none' } } },
      };

      chat.names = false;

      chat.messageStyles = {
        default: {
          shared: {
            bubble: {
              borderRadius: '0',
              padding: bubblePad,
              maxWidth: '100%',
              lineHeight: lh,
              color: fg,
            },
          },
          ai: {
            outerContainer: { justifyContent: 'flex-start' },
            bubble: { backgroundColor: srf },
          },
          user: {
            outerContainer: { justifyContent: 'flex-end' },
            bubble: { backgroundColor: pg, border: border1 },
          },
        },
        loading: {
          message: {
            styles: {
              outerContainer: { justifyContent: 'flex-start' },
              bubble: {
                backgroundColor: srf,
                color: met,
                borderRadius: '0',
                padding: '0',
                border: 'none',
              },
            },
          },
          /** `small` = scroll-to-top pagination; `full` = first paint. Defaults are a large ring — very noticeable. */
          history: {
            full: {
              styles: {
                outerContainer: { justifyContent: 'flex-start', marginTop: 'calc(var(--spacing-unit) * 0.75)' },
                bubble: {
                  height: '36px',
                  width: '36px',
                  margin: '4px 0',
                  border: '3px solid ' + met,
                },
              },
            },
            small: {
              styles: {
                outerContainer: {
                  justifyContent: 'flex-start',
                  marginTop: 'calc(var(--spacing-unit) * 0.35)',
                  marginBottom: 'calc(var(--spacing-unit) * 1)',
                },
                bubble: {
                  border: 'none',
                  backgroundColor: 'transparent',
                  minHeight: '0',
                  padding: 'calc(var(--spacing-unit) * 0.35) 0',
                },
              },
              html: '<span class="den-history-loading">Loading earlier messages\u2026</span>',
            },
          },
        },
      };

      chat.textInput = {
        styles: {
          container: {
            width: '100%',
            margin: '0',
            border: 'unset',
            borderTop: border1,
            borderRadius: '0px',
            boxShadow: 'unset',
            backgroundColor: ff,
            color: fg,
          },
          text: {
            color: fg,
            fontFamily: bodyFont,
            fontSize: tok.inputFont,
            paddingTop: tok.inputPadT,
            paddingBottom: tok.inputPadB,
            paddingLeft: tok.inputPadL,
            paddingRight: tok.inputPadR,
          },
          focus: {},
        },
        placeholder: { text: 'Message your bear\u2026', style: { color: met } },
      };

      chat.submitButtonStyles = {
        submit:  { container: { default: { transform: submitScale, marginBottom: tok.submitMb, marginRight: tok.submitMr } } },
        loading: { container: { default: { transform: submitScale, marginBottom: tok.submitMb, marginRight: tok.submitMr } } },
        stop:    { container: { default: { transform: submitScale, marginBottom: tok.submitMb, marginRight: tok.submitMr } } },
      };

      chat.inputAreaStyle = { backgroundColor: ff };

      chat.auxiliaryStyle =
        '::-webkit-scrollbar{width:var(--chat-scrollbar-size)}' +
        '::-webkit-scrollbar-thumb{background:var(--meta-color);border-radius:0}' +
        '::-webkit-scrollbar-track{background:transparent}' +
        /* Default Deep Chat downwards layout is display:grid with implicit auto rows; after
           loadHistory the message list can steal all height and clip #input until a reflow
           (e.g. window focus). Pin messages to a flexible scroll row and keep the composer row. */
        '#chat-view.deep-chat-downwards-mode{grid-template-rows:minmax(0,1fr) auto!important;min-height:0!important}' +
        '#chat-view.deep-chat-downwards-mode #messages{min-height:0!important}' +
        '#chat-view.deep-chat-downwards-mode #input{margin-top:0!important}' +
        '#text-input{background-color:var(--field-fill-color)!important}' +
        '#messages{padding-top:var(--chat-messages-padding-top)!important;background-color:var(--surface-color)!important;scroll-behavior:auto}' +
        '.den-history-loading{display:inline-block;font-size:smaller;font-style:italic;color:var(--meta-color);opacity:0.88}' +
        '.den-reasoning-wrap{font-size:smaller;color:inherit;opacity:0.92}' +
        '.den-reasoning-head{display:flex;align-items:center;gap:calc(var(--spacing-unit) * 0.9);min-width:0}' +
        '.den-reasoning-kicker{flex:0 0 auto;font-variant:small-caps;letter-spacing:0.06em;font-size:smaller;opacity:0.8}' +
        '.den-reasoning-scroll{flex:1 1 auto;min-width:0;overflow-x:auto;overflow-y:hidden;max-height:calc(1em * var(--chat-line-height));line-height:var(--chat-line-height);font-family:var(--data-font-family),ui-monospace,monospace;font-size:smaller;white-space:nowrap;-webkit-overflow-scrolling:touch}' +
        '.den-reasoning-wrap.den-reasoning-expanded .den-reasoning-scroll{white-space:pre-wrap;overflow-x:visible;overflow-y:auto;max-height:calc(var(--spacing-unit) * 36)}' +
        '.den-reasoning-toggle{flex:0 0 auto;margin:0;padding:calc(var(--spacing-unit) * 0.24) calc(var(--spacing-unit) * 0.7);border:none;background:transparent;color:inherit;opacity:0.72;cursor:pointer;font:inherit;font-size:smaller;text-decoration:underline;text-underline-offset:calc(var(--thin-line-unit) * 2)}' +
        '.den-reasoning-toggle:hover{opacity:1}' +
        '.den-assistant-html{color:inherit}' +
        '.den-assistant-html .den-assistant-plain{color:inherit}' +
        '.den-system-reminder{display:block;margin:calc(var(--spacing-unit) * 0.6) 0 0 0;padding:calc(var(--spacing-unit) * 0.5) 0 0 0;border-top:var(--thin-line-unit) solid var(--border-color);color:var(--meta-color);font-size:smaller}' +
        '.den-system-reminder-summary{cursor:pointer;font:inherit;list-style-position:outside}' +
        '.den-system-reminder-body{margin:calc(var(--spacing-unit) * 0.45) 0 0 0;padding:0;white-space:pre-wrap;word-break:break-word;font-family:var(--data-font-family),ui-monospace,monospace}' +
        '.den-reasoning-scroll .den-assistant-html{white-space:normal!important}' +
        '.den-reasoning-scroll .den-assistant-html .den-system-reminder-body{white-space:pre-wrap!important}';

      chat.remarkable = { html: false, breaks: true };

      chat.connect = { handler: lettaSseHandler, stream: true };

      chat.loadHistory = loadDenHistory;

      chat.addEventListener('click', function (ev) {
        var path = typeof ev.composedPath === 'function' ? ev.composedPath() : [ev.target];
        var btn = null;
        for (var i = 0; i < path.length; i++) {
          var n = path[i];
          if (n && n.nodeType === 1 && n.classList && n.classList.contains('den-reasoning-toggle')) {
            btn = n;
            break;
          }
        }
        if (!btn) return;
        var w = btn.closest('[data-den-reasoning]');
        if (!w) return;
        var on = !w.classList.contains('den-reasoning-expanded');
        w.classList.toggle('den-reasoning-expanded', on);
        btn.setAttribute('aria-expanded', on ? 'true' : 'false');
        btn.textContent = on ? 'Collapse' : 'Expand';
      });
    }

    /** Map one Letta SSE JSON object to `{ error: string }` or null. */
    function lettaStreamEventErrorSignal(obj) {
      var inner = lettaInnerForStream(obj);
      if (!inner || inner.message_type !== 'error_message') return null;
      var lines = [];
      if (inner.error_type) lines.push('[' + String(inner.error_type) + ']');
      if (inner.message) lines.push(String(inner.message));
      if (inner.detail) lines.push(String(inner.detail));
      var msg = lines.length ? lines.join('\n\n') : 'An error occurred.';
      return { error: msg };
    }

    function lettaSseHandler(body, signals) {
      var userText = (body.messages || [])
        .filter(function (m) { return m.role === 'user'; })
        .map(function (m) { return m.text || ''; })
        .pop() || '';

      if (!BEAR_ID) { signals.onResponse({ error: 'Missing bear.' }); return; }
      errEl.hidden = true;

      var abortCtl = new AbortController();
      signals.stopClicked.listener = function () { abortCtl.abort(); };

      fetch('/v1/chat/send', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          bear_id: BEAR_ID,
          message: userText,
          conversation_id: CONVERSATION_ID,
        }),
        signal: abortCtl.signal,
      }).then(function (response) {
        if (response.status === 401) {
          window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
          return;
        }
        if (!response.ok) {
          return response.text().then(function (t) {
            signals.onResponse({ error: t || 'HTTP ' + response.status });
          });
        }
        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var lineBuf = '';
        var reasoningFull = '';
        var hadReasoning = false;
        var assistantBuf = '';
        var assistantLastId = null;
        var NO_ID = '___den_letta_assistant_no_id___';
        signals.onOpen();

        function pump() {
          return reader.read().then(function (result) {
            if (result.done) { signals.onClose(); return; }
            lineBuf += decoder.decode(result.value, { stream: true });
            var nl;
            while ((nl = lineBuf.indexOf('\n')) >= 0) {
              var raw = lineBuf.slice(0, nl);
              lineBuf = lineBuf.slice(nl + 1);
              var line = raw.replace(/\r$/, '');
              if (!line.startsWith('data: ')) continue;
              var payload = line.slice(6).trim();
              if (payload === '' || payload === '[DONE]') continue;
              try { var obj = JSON.parse(payload); } catch (_) { continue; }
              var errSig = lettaStreamEventErrorSignal(obj);
              if (errSig) {
                signals.onResponse(errSig);
                continue;
              }
              var inner = lettaInnerForStream(obj);
              if (!inner || typeof inner !== 'object') continue;

              if (inner.message_type === 'reasoning_message') {
                var piece = '';
                if (typeof inner.reasoning === 'string') piece = inner.reasoning;
                else piece = assistantChunkText(inner);
                if (!piece) continue;
                var wasEmpty = reasoningFull.length === 0;
                reasoningFull += piece;
                hadReasoning = true;
                signals.onResponse({
                  text: buildReasoningMarkdown(reasoningFull),
                  role: 'ai',
                  overwrite: !wasEmpty,
                });
                continue;
              }

              if (inner.message_type === 'assistant_message') {
                var chunk = assistantChunkText(inner);
                var aid =
                  inner.id != null && String(inner.id) !== '' ? String(inner.id) : null;
                var sameAssistant =
                  aid != null
                    ? aid === assistantLastId
                    : assistantLastId === NO_ID;
                if (!sameAssistant) {
                  assistantLastId = aid != null ? aid : NO_ID;
                  assistantBuf = chunk;
                } else {
                  assistantBuf += chunk;
                }
                if (DEN_CHAT_DEBUG_VERBOSE && /<system-reminder/i.test(assistantBuf)) {
                  signals.onResponse({
                    text: assistantBuf,
                    role: 'ai',
                    overwrite: hadReasoning || sameAssistant,
                  });
                } else {
                  signals.onResponse({
                    text: DEN_CHAT_DEBUG_VERBOSE ? assistantBuf : stripSystemReminderBlocks(assistantBuf),
                    role: 'ai',
                    overwrite: hadReasoning || sameAssistant,
                  });
                }
                if (hadReasoning) hadReasoning = false;
              }
            }
            return pump();
          });
        }
        return pump();
      }).catch(function (x) {
        if (x.name === 'AbortError') {
          signals.onResponse({ text: '\n[stopped]' });
          signals.onClose();
        } else {
          signals.onResponse({ error: String(x.message || x) });
        }
      });
    }

    function remountDeepChat() {
      var wrap = document.getElementById('chat-wrap');
      if (!wrap) return;
      historyNextBefore = null;
      wrap.innerHTML = '<deep-chat id="chat"></deep-chat>';
      customElements.whenDefined('deep-chat').then(configureDenChat);
    }

    function loadConversations() {
      if (!BEAR_ID) {
        return Promise.resolve();
      }
      return fetch('/v1/chat/conversations?bear_id=' + encodeURIComponent(BEAR_ID), {
        credentials: 'same-origin',
      })
        .then(function (response) {
          if (response.status === 401) {
            window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
            return { __den_skip: true };
          }
          if (!response.ok) {
            return response.text().then(function (t) {
              throw new Error(t || 'HTTP ' + response.status);
            });
          }
          return response.json();
        })
        .then(function (data) {
          if (data && data.__den_skip) return 'skip-boot';
          var sel = document.getElementById('den-conv');
          if (!sel) return;
          var list = data && data.conversations ? data.conversations : [];
          sel.innerHTML = '';
          var i;
          for (i = 0; i < list.length; i++) {
            var c = list[i];
            if (!c || !c.id) continue;
            var opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.title || c.id;
            sel.appendChild(opt);
          }
          if (sel.options.length === 0) {
            var o = document.createElement('option');
            o.value = 'default';
            o.textContent = 'Main chat';
            sel.appendChild(o);
          }
          var firstId = list[0] && list[0].id ? list[0].id : 'default';
          sel.value = firstId;
          CONVERSATION_ID = sel.value;
          sel.onchange = function () {
            CONVERSATION_ID = sel.value;
            remountDeepChat();
          };
          return 'ok';
        })
        .catch(function (err) {
          showErr(String(err.message || err));
          var sel = document.getElementById('den-conv');
          if (sel) {
            sel.innerHTML = '';
            var o = document.createElement('option');
            o.value = 'default';
            o.textContent = 'Main chat';
            sel.appendChild(o);
            sel.onchange = function () {
              CONVERSATION_ID = sel.value;
              remountDeepChat();
            };
          }
          CONVERSATION_ID = 'default';
          return 'ok';
        });
    }

    function boot() {
      loadConversations()
        .then(function (tag) {
          if (tag === 'skip-boot') return false;
          return customElements.whenDefined('deep-chat').then(function () {
            return true;
          });
        })
        .then(function (doConfigure) {
          if (doConfigure) configureDenChat();
        })
        .catch(function (err) {
          showErr(String(err.message || err));
          customElements.whenDefined('deep-chat').then(configureDenChat);
        });
    }

    boot();
</script>
{% endblock %}
