<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat — Den</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --page-color:   #EEEEEE;
      --text-color:   #121212;
      --border-color: #121212;
      --accent-color: #cc11dd;
      --meta-color:   #aaaaaa;
      --error-color:  #CC0000;
      --surface-color:#DDDDDD;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --page-color:   #121212;
        --text-color:   #DDDDDD;
        --border-color: #DDDDDD;
        --surface-color:#1a1a1a;
      }
    }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--page-color);
      color: var(--text-color);
      font-family: "Geist", sans-serif;
    }
    .den-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-width: 56rem;
      margin: 0 auto;
      padding: 1rem;
      width: 100%;
      box-sizing: border-box;
    }
    .den-toolbar {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .den-toolbar a { color: var(--text-color); text-decoration: underline; }
    .den-toolbar a:hover { color: var(--accent-color); }
    .den-toolbar label { font-size: 0.9rem; text-transform: uppercase; }
    .den-toolbar select {
      min-width: 12rem;
      padding: 0.35rem 0.5rem;
      border-radius: 0;
      border: 1px solid var(--border-color);
      background: var(--page-color);
      color: var(--text-color);
      font-family: "Geist", sans-serif;
    }
    .den-err { color: var(--error-color); font-size: 0.9rem; margin: 0.5rem 0; }
    #chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
  </style>
</head>
<body>
  <div class="den-wrap">
    <div class="den-toolbar">
      <a href="/">Home</a>
      <label>Bear <select id="bear-picker" aria-label="Bear"></select></label>
      <span id="bear-status"></span>
    </div>
    <p id="err" class="den-err" hidden></p>
    <div id="chat-wrap">
      <deep-chat id="chat"></deep-chat>
    </div>
  </div>
  <script type="module" src="/assets/deep-chat/deepChat.bundle.js"></script>
  <script>
    var errEl      = document.getElementById('err');
    var statusEl   = document.getElementById('bear-status');
    var bearPicker = document.getElementById('bear-picker');

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.hidden = false;
    }

    function cv(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    /* ── bear picker ── */

    async function loadBears() {
      var r = await fetch('/v1/bears', { credentials: 'same-origin' });
      if (r.status === 401) {
        window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
        return;
      }
      if (!r.ok) { showErr('Could not load bears: HTTP ' + r.status); return; }
      var bears = await r.json();
      bearPicker.innerHTML = '';
      if (!bears.length) {
        statusEl.textContent = 'No bears assigned \u2014 ask an operator to grant membership.';
        return;
      }
      bears.forEach(function (b) {
        var opt = document.createElement('option');
        opt.value = b.bear_id;
        opt.textContent = b.slug + ' \u2014 ' + b.name;
        bearPicker.appendChild(opt);
      });
      statusEl.textContent = bears.length + ' bear(s).';
      applyBearName();
    }

    function currentBearName() {
      var sel = bearPicker.selectedOptions[0];
      return sel ? sel.textContent.split(' \u2014 ').pop() : 'Bear';
    }

    function applyBearName() {
      var chat = document.getElementById('chat');
      var acc = cv('--accent-color');
      var met = cv('--meta-color');
      chat.names = {
        ai:   { text: currentBearName(), style: { color: acc, fontSize: '0.8rem', fontWeight: '600', textTransform: 'uppercase' } },
        user: { text: 'You',             style: { color: met, fontSize: '0.8rem', fontWeight: '600', textTransform: 'uppercase' } },
      };
    }

    bearPicker.addEventListener('change', function () {
      var chat = document.getElementById('chat');
      chat.clearMessages();
      applyBearName();
    });

    /* ── configure Deep Chat ── */

    function configureDenChat() {
      var chat = document.getElementById('chat');
      var pg  = cv('--page-color');
      var fg  = cv('--text-color');
      var brd = cv('--border-color');
      var acc = cv('--accent-color');
      var met = cv('--meta-color');
      var srf = cv('--surface-color');

      chat.style.cssText =
        'flex:1; width:100%; border:solid 1px ' + brd +
        '; border-radius:0; font-family:"Geist",sans-serif;' +
        ' font-size:0.9375rem; background:' + pg + ';';

      chat.avatars = {
        ai:   { src: '', styles: { avatar: { display: 'none' } } },
        user: { src: '', styles: { avatar: { display: 'none' } } },
      };

      chat.names = {
        ai:   { text: 'Bear', style: { color: acc, fontSize: '0.8rem', fontWeight: '600', textTransform: 'uppercase' } },
        user: { text: 'You',  style: { color: met, fontSize: '0.8rem', fontWeight: '600', textTransform: 'uppercase' } },
      };

      chat.messageStyles = {
        default: {
          shared: {
            outerContainer: { justifyContent: 'flex-start' },
            bubble: {
              borderRadius: '0',
              padding: '6px 0 10px 0',
              maxWidth: '100%',
              lineHeight: '1.6',
              color: fg,
              backgroundColor: 'transparent',
              borderBottom: '1px solid ' + brd,
              marginLeft: '0',
            },
          },
          ai:   { bubble: {} },
          user: { bubble: {} },
        },
        loading: {
          message: {
            styles: {
              outerContainer: { justifyContent: 'flex-start' },
              bubble: { backgroundColor: 'transparent', color: met, borderRadius: '0', borderBottom: '1px solid ' + brd, padding: '6px 0 10px 0' },
            },
          },
        },
      };

      chat.textInput = {
        styles: {
          container: { backgroundColor: pg, border: '1px solid ' + brd, borderRadius: '0', color: fg },
          text:      { color: fg, fontFamily: "'Geist', sans-serif" },
          focus:     { borderColor: acc },
        },
        placeholder: { text: 'Message your bear\u2026', style: { color: met } },
      };

      chat.submitButtonStyles = {
        submit:   { container: { default: { backgroundColor: acc, borderRadius: '0' }, hover: { backgroundColor: acc, filter: 'brightness(0.85)' } }, svg: { styles: { default: { filter: 'brightness(0) invert(1)' } } } },
        loading:  { container: { default: { backgroundColor: met, borderRadius: '0' } }, svg: { styles: { default: { filter: 'brightness(0) invert(1)' } } } },
        stop:     { container: { default: { backgroundColor: '#CC0000', borderRadius: '0' }, hover: { backgroundColor: '#aa0000' } }, svg: { styles: { default: { filter: 'brightness(0) invert(1)' } } } },
        disabled: { container: { default: { backgroundColor: srf, borderRadius: '0', cursor: 'default' } }, svg: { styles: { default: { filter: 'brightness(0) invert(0.5)' } } } },
      };

      chat.inputAreaStyle = { backgroundColor: pg, borderTop: '1px solid ' + brd };

      chat.auxiliaryStyle =
        '::-webkit-scrollbar{width:6px}' +
        '::-webkit-scrollbar-thumb{background:' + met + ';border-radius:0}' +
        '::-webkit-scrollbar-track{background:transparent}';

      chat.remarkable = { html: false, breaks: true };

      chat.connect = { handler: lettaSseHandler, stream: true };
    }

    /* ── Letta SSE handler ── */

    function lettaSseHandler(body, signals) {
      var userText = (body.messages || [])
        .filter(function (m) { return m.role === 'user'; })
        .map(function (m) { return m.text || ''; })
        .pop() || '';

      var bearId = bearPicker.value;
      if (!bearId) { signals.onResponse({ error: 'Pick a bear first.' }); return; }
      errEl.hidden = true;

      var abortCtl = new AbortController();
      signals.stopClicked.listener = function () { abortCtl.abort(); };

      fetch('/v1/chat/send', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bear_id: bearId, message: userText }),
        signal: abortCtl.signal,
      }).then(function (response) {
        if (response.status === 401) {
          window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
          return;
        }
        if (!response.ok) {
          return response.text().then(function (t) {
            signals.onResponse({ error: t || 'HTTP ' + response.status });
          });
        }
        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var lineBuf = '';
        signals.onOpen();

        function pump() {
          return reader.read().then(function (result) {
            if (result.done) { signals.onClose(); return; }
            lineBuf += decoder.decode(result.value, { stream: true });
            var nl;
            while ((nl = lineBuf.indexOf('\n')) >= 0) {
              var raw = lineBuf.slice(0, nl);
              lineBuf = lineBuf.slice(nl + 1);
              var line = raw.replace(/\r$/, '');
              if (!line.startsWith('data: ')) continue;
              var payload = line.slice(6).trim();
              if (payload === '' || payload === '[DONE]') continue;
              try { var obj = JSON.parse(payload); } catch (_) { continue; }
              if (obj.message_type === 'assistant_message' && typeof obj.content === 'string') {
                signals.onResponse({ text: obj.content });
              }
            }
            return pump();
          });
        }
        return pump();
      }).catch(function (x) {
        if (x.name === 'AbortError') {
          signals.onResponse({ text: '\n[stopped]' });
          signals.onClose();
        } else {
          signals.onResponse({ error: String(x.message || x) });
        }
      });
    }

    customElements.whenDefined('deep-chat').then(function () {
      configureDenChat();
      loadBears();
    });
  </script>
</body>
</html>
