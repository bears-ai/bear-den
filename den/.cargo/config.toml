[build]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[env]
MEMORY_SERVE_QUIET = "1"

# ARM64 — use lld for fast linking. Do NOT set target-cpu=native here;
# Docker images must run on any aarch64 host (baseline ARMv8-A / "generic").
[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-musl]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
