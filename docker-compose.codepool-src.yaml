# Optional merge: build `bear-codepool` from `./codepool` instead of pulling GHCR (local dev).
#
#   docker compose -f docker-compose.yaml -f docker-compose.codepool-src.yaml up --build
#
# Production: use the default image from `.github/workflows/codepool-image.yml` (avoids npm/native builds on small hosts).

services:
  bear-codepool:
    image: bear-codepool:local
    build:
      context: ./codepool
      dockerfile: Dockerfile
