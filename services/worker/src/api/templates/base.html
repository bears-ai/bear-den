<!doctype html>
<html lang="en">
    <head>
        <title>{% block title %}API{% endblock %}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="utf-8">
        <style>
            /* Reset and base styles */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --primary-color: #cc11dd;
                --text-color: #121212;
                --bg-color: #ffffff;
                --border-color: #e0e0e0;
                --error-color: #cc0000;
                --success-color: #009900;
                --warning-color: #ee7700;
                --button-bg: #f8f9fa;
                --button-hover: #e9ecef;
                --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                --mono-font: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --text-color: #ffffff;
                    --bg-color: #121212;
                    --border-color: #333333;
                    --button-bg: #2d2d2d;
                    --button-hover: #404040;
                }
            }

            body {
                font-family: var(--font-family);
                line-height: 1.6;
                color: var(--text-color);
                background-color: var(--bg-color);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            /* Header styles */
            header {
                padding: 1rem 2rem;
                border-bottom: 1px solid var(--border-color);
                background-color: var(--bg-color);
            }

            .logo {
                display: flex;
                align-items: center;
                text-decoration: none;
                color: var(--text-color);
                font-weight: 700;
                font-size: 1.5rem;
            }

            .logo:hover {
                color: var(--primary-color);
            }

            /* Main content */
            main {
                flex: 1;
                padding: 2rem;
                max-width: 600px;
                margin: 0 auto;
                width: 100%;
            }

            /* Typography */
            h1, h2, h3 {
                margin-bottom: 1rem;
                font-weight: 600;
            }

            h1 {
                font-size: 2rem;
                color: var(--primary-color);
            }

            h2 {
                font-size: 1.5rem;
            }

            p {
                margin-bottom: 1rem;
            }

            /* Form styles */
            .form-container {
                background: var(--bg-color);
                border: 1px solid var(--border-color);
                border-radius: 8px;
                padding: 2rem;
                margin: 2rem 0;
            }

            .form-field {
                margin-bottom: 1.5rem;
            }

            label {
                display: block;
                margin-bottom: 0.5rem;
                font-weight: 500;
            }

            input[type="text"],
            input[type="email"],
            input[type="password"],
            input[type="hidden"] {
                width: 100%;
                padding: 0.75rem;
                border: 1px solid var(--border-color);
                border-radius: 4px;
                font-size: 1rem;
                background-color: var(--bg-color);
                color: var(--text-color);
            }

            input:focus {
                outline: none;
                border-color: var(--primary-color);
                box-shadow: 0 0 0 2px rgba(204, 17, 221, 0.2);
            }

            /* Button styles */
            .button-group {
                display: flex;
                gap: 1rem;
                margin-top: 2rem;
            }

            button, .button {
                padding: 0.75rem 1.5rem;
                border: 1px solid var(--border-color);
                border-radius: 4px;
                font-size: 1rem;
                font-weight: 500;
                cursor: pointer;
                text-decoration: none;
                display: inline-block;
                text-align: center;
                transition: all 0.2s ease;
                background-color: var(--button-bg);
                color: var(--text-color);
            }

            button:hover, .button:hover {
                background-color: var(--button-hover);
            }

            .button-primary {
                background-color: var(--primary-color);
                color: white;
                border-color: var(--primary-color);
            }

            .button-primary:hover {
                background-color: #b30ec7;
                border-color: #b30ec7;
            }

            .button-danger {
                background-color: var(--error-color);
                color: white;
                border-color: var(--error-color);
            }

            .button-danger:hover {
                background-color: #b30000;
                border-color: #b30000;
            }

            /* Alert styles */
            .alert {
                padding: 1rem;
                border-radius: 4px;
                margin-bottom: 1.5rem;
                border: 1px solid;
            }

            .alert-error {
                background-color: #ffeaea;
                border-color: var(--error-color);
                color: var(--error-color);
            }

            .alert-warning {
                background-color: #fff3e0;
                border-color: var(--warning-color);
                color: var(--warning-color);
            }

            .alert-success {
                background-color: #e8f5e8;
                border-color: var(--success-color);
                color: var(--success-color);
            }

            @media (prefers-color-scheme: dark) {
                .alert-error {
                    background-color: #2d1a1a;
                    color: #ff6b6b;
                }

                .alert-warning {
                    background-color: #2d2419;
                    color: #ffa726;
                }

                .alert-success {
                    background-color: #1a2d1a;
                    color: #66bb6a;
                }
            }

            /* Utility classes */
            .text-center {
                text-align: center;
            }

            .text-muted {
                color: #6c757d;
                font-size: 0.9rem;
            }

            .code {
                font-family: var(--mono-font);
                background-color: var(--button-bg);
                padding: 0.2rem 0.4rem;
                border-radius: 3px;
                font-size: 0.9rem;
            }

            /* Responsive design */
            @media (max-width: 768px) {
                header {
                    padding: 1rem;
                }

                main {
                    padding: 1rem;
                }

                .form-container {
                    padding: 1.5rem;
                    margin: 1rem 0;
                }

                .button-group {
                    flex-direction: column;
                }

                button, .button {
                    width: 100%;
                }
            }

            /* Footer */
            footer {
                padding: 1rem 2rem;
                border-top: 1px solid var(--border-color);
                text-align: center;
                color: #6c757d;
                font-size: 0.9rem;
            }

            footer a {
                color: var(--primary-color);
                text-decoration: none;
            }

            footer a:hover {
                text-decoration: underline;
            }
        </style>
        {% block head %}{% endblock %}
    </head>
    <body>
        <header>
            <a href="/" class="logo"><span>App</span></a>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; 2025 The Artificial Creative BV</p>
        </footer>
    </body>
</html>
