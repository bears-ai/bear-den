# Bifrost for BEARS — use with Coolify’s **Docker Compose** build pack from Git.
#
# Coolify UI (summary):
#   - Add Resource → Public/Private Git → Build Pack: **Docker Compose**
#   - Base Directory: `services/bifrost`
#   - Docker Compose file: `docker-compose.yaml`
#   - Enable **Preserve Repository During Deployment** so `./config.json` binds from the clone.
#   - Set secrets (e.g. OPENAI_API_KEY) in Coolify → Environment Variables for this resource.
#
# Prefer the **repository root** [`docker-compose.yaml`](../../docker-compose.yaml) for a single shared
# network with Letta, Codepool, and Den (`bear-bifrost`, …).
#
# See COOLIFY_DEPLOY.md for full steps and links.

services:
  bear-bifrost:
    image: maximhq/bifrost:v1.4.22
    restart: unless-stopped
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      LOG_LEVEL: info
      LOG_STYLE: json
    volumes:
      # See root `docker-compose.yaml`: missing host file + default bind behavior can create a
      # directory at `config.json`. `create_host_path: false` avoids that footgun.
      - type: bind
        source: ./config.json
        target: /app/data/config.json
        read_only: true
        bind:
          create_host_path: false
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1:$${APP_PORT:-8080}/health || exit 1",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
