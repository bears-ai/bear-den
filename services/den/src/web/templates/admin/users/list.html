{% extends "admin/base.html" %}

{% block title %}All Users{% endblock %}

{% block admin_content %}
<table>
  {% for user in users %}
  <tr>
    <td>{{ user.id }}{% if user.admin_flag %} <span title="Administrator">(admin)</span>{% endif %}</td>
    <td>{{ user.username }}</td>
    <td>{{ user.display_name }}</td>
    <td><a class="navigate" href="./{{ user.id }}">Details</a></td>
    <td></td>
  </tr>
  {% endfor %}
</table>
<a class="action" href="./add">Add User</a>
{% endblock %}
