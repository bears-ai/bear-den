# Garage for BEARS — S3-compatible object storage (chat media, generated images).
#
# Coolify UI (summary):
#   - Add Resource → Public/Private Git → Build Pack: **Docker Compose**
#   - Base Directory: `services/garage`
#   - Docker Compose file: `docker-compose.yaml`
#   - Set secrets via Coolify → Environment Variables (see .env.example).
#
# Prefer aligning the **service name** with [`docker-compose.yaml`](../../docker-compose.yaml) conventions (`bear-garage`).
#
# See COOLIFY_DEPLOY.md for full steps and links.

services:
  bear-garage:
    image: dxflrs/garage:v2.2.0
    restart: unless-stopped
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    ports:
      - "3900:3900"   # S3 API
      - "3902:3902"   # Web (static site hosting, optional)
      - "3903:3903"   # Admin API
    healthcheck:
      test: ["CMD", "garage", "stats", "-a"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  garage-meta:
  garage-data:
