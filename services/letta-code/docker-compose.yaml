# Letta Code harness for BEARS — use with Coolify **Docker Compose** build pack from Git.
#
# Coolify UI (summary):
#   - Add Resource → Git → Build Pack: **Docker Compose**
#   - Base Directory: `services/letta-code`
#   - Docker Compose file: `docker-compose.yaml`
#   - Required keys are declared under `environment` (Coolify can show them); set LETTA_API_KEY in the UI.
#   - Add a persistent volume for service "letta-code-data" → /root (auth + local state).
#
# See COOLIFY_DEPLOY.md for full steps and Den wiring (LETTA_CODE_BASE_URL).
#
# Required keys are listed under `environment` so Coolify (and similar) can surface them in the UI.
# Set values in the platform’s Environment Variables; for local `docker compose`, use a `.env` file
# next to this file (Compose loads it for ${…} substitution).

services:
  bears-letta-code:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Required — Letta HTTP API (internal URL; no trailing slash).
      LETTA_BASE_URL: ${LETTA_BASE_URL:-http://bears-letta:8283}
      # Required — Bearer token Letta accepts (typically same as LETTA_SERVER_PASS on Letta).
      LETTA_API_KEY: ${LETTA_API_KEY:-}
      # Optional — label in Letta Code environment picker.
      ENV_NAME: ${ENV_NAME:-bears-prod}
      # Optional — set to 1 for verbose harness logs.
      LETTA_DEBUG: ${LETTA_DEBUG:-}
    volumes:
      - letta-code-data:/root
    # Publish the harness HTTP port here once your Letta Code version binds it (Den → LETTA_CODE_BASE_URL).
    # If nothing listens yet, see COOLIFY_DEPLOY.md "Ports and validation" (harness HTTP vs outbound WS).

volumes:
  letta-code-data:
