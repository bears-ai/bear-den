services:
  letta:
    image: lettaai/letta:latest
    platform: linux/amd64  # Enable x86_64 emulation on ARM64
    ports:
      - "8283:8283"  # Letta ADE (Admin Development Environment) Web UI
      - "3000:8080"  # Letta API Server (external:internal)
    environment:
      - ONYX_URL=http://onyx-api-server:8080
      - LLM_API_URL=http://litellm:4000/v1
      - MODEL_NAME=gpt-4
      - LETTA_SERVER_PASS=${LETTA_API_KEY}
      - LETTA_SERVER_PORT=8080
      - OPENAI_API_KEY=${OPENAI_API_KEY}  # For embeddings
    depends_on:
      onyx-api-server:
        condition: service_started
      litellm:
        condition: service_healthy
    volumes:
      - letta_data:/root/.letta
    networks:
      - letta_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  onyx-api-server:
    image: onyxdotapp/onyx-backend:latest
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_HOST=onyx-db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=onyx
      - QDRANT_HOST=qdrant
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AUTH_TYPE=disabled
    depends_on:
      onyx-db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./memories:/app/memories
      - ./history:/app/history
      - ./projects:/app/projects
    networks:
      - letta_net
    restart: unless-stopped

  onyx-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=onyx
    volumes:
      - onyx_db_data:/var/lib/postgresql/data
    networks:
      - letta_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - letta_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  litellm:
    image: ghcr.io/berriai/litellm:main
    platform: linux/amd64  # Force x86 image since no ARM build is available
    ports:
      - "4000:4000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LITELLM_MODEL_NAME=openai/gpt-4
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - PORT=4000
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - letta_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  qdrant_data:
  letta_data:
  onyx_db_data:

networks:
  letta_net:
    driver: bridge
