# BEARS stack — single Docker Compose project with one shared network (`bears-stack`).
#
# Recommended for Coolify: Add Resource → Docker Compose → this repository,
# Base Directory: `.` (repo root), Compose file: `docker-compose.yaml`.
#
# Service DNS names (use these in env defaults and cross-service URLs):
#   bears-postgres (optional Den DB, profile `bundled`), bears-letta-postgres (optional PGVector DB,
#   profile `bundled`), bears-bifrost, bears-redis, bears-memfs-manager, bears-letta, bears-codepool, bears-den
#
# PostgreSQL: set **`DATABASE_URL`** for `bears-den` (managed DB — preferred in Coolify) and
# **`LETTA_PG_URI`** for Letta's pgvector database. Optional bundled Postgres services use
# **fixed** credentials in this file (no `POSTGRES_*` env interpolation) so orchestrators do not invent fields.
# Enable bundled databases with profile `bundled`:
#   COMPOSE_PROFILES=bundled
#   docker compose --profile bundled up -d
#
# See docs/deployment/DEPLOYMENT.md and per-service COOLIFY_DEPLOY.md files.
#
# **Preflight** services run once at deploy time and validate config before other services start
# (`depends_on` + `service_completed_successfully`). They are split so detached deploy logs identify
# the failing check, e.g. `bears-preflight-den-db` or `bears-preflight-letta-pg`. Requires Docker
# Compose **v2.20+**. Run manually: `docker compose run --rm bears-preflight-config`.

name: bears-stack

x-preflight-build: &preflight-build
    context: ./services/preflight
    dockerfile: Dockerfile

x-preflight-environment: &preflight-environment
    BIFROST_CONFIG_PATH: /app/bifrost/config.json
    JWT_SECRET: ${JWT_SECRET:-SETME}
    LETTA_SERVER_PASS: ${LETTA_SERVER_PASS:-SETME}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-SETME}
    DATABASE_URL: ${DATABASE_URL:-SETME}
    LETTA_PG_URI: ${LETTA_PG_URI:-SETME}
    WEB_SERVER_URL: ${WEB_SERVER_URL:-${SERVICE_URL_BEARS_DEN:-SETME}}
    LLM_API_URL: ${LLM_API_URL:-http://bears-bifrost:8080/v1}
    LETTA_BASE_URL: ${LETTA_BASE_URL:-http://bears-letta:8283}
    CODEPOOL_BASE_URL: ${CODEPOOL_BASE_URL:-http://bears-codepool:3030}
    LETTA_MEMFS_SERVICE_URL: ${LETTA_MEMFS_SERVICE_URL:-http://bears-memfs-manager:8285}
    MEMFS_DEFAULT_ORG: ${MEMFS_DEFAULT_ORG:-org-00000000-0000-4000-8000-000000000000}

x-preflight-depends: &preflight-depends
    bears-preflight-config:
        condition: service_completed_successfully
    bears-preflight-den-db:
        condition: service_completed_successfully
    bears-preflight-letta-pg:
        condition: service_completed_successfully

services:
    workspace:
        profiles:
            - dev
        build: .devcontainer
        volumes:
            - .:/workspace
            - /var/run/docker.sock:/var/run/docker.sock
        command: sleep infinity

    bears-preflight-config:
        build: *preflight-build
        restart: "no"
        command: ["config"]
        environment: *preflight-environment
        volumes:
            - ./services/bifrost/config.json:/app/bifrost/config.json:ro

    bears-preflight-den-db:
        build: *preflight-build
        restart: "no"
        depends_on:
            bears-postgres:
                condition: service_healthy
                required: false
        command: ["den-db"]
        environment: *preflight-environment

    bears-preflight-letta-pg:
        build: *preflight-build
        restart: "no"
        depends_on:
            bears-letta-postgres:
                condition: service_healthy
                required: false
        command: ["letta-pg"]
        environment: *preflight-environment

    bears-postgres:
        profiles:
            - bundled
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            # Fixed dev defaults. For production, prefer a managed database and set `DATABASE_URL`.
            POSTGRES_USER: bears
            POSTGRES_PASSWORD: bears
            POSTGRES_DB: den
        volumes:
            - bears-postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U bears -d den"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s

    bears-letta-postgres:
        profiles:
            - bundled
        build:
            context: ./services/letta/postgres
            dockerfile: Dockerfile
        image: ${LETTA_POSTGRES_IMAGE:-bears-letta-postgres:pg16-vector}
        restart: unless-stopped
        environment:
            # Fixed dev defaults. For production, prefer a managed PGVector database and set `LETTA_PG_URI`.
            POSTGRES_USER: bears
            POSTGRES_PASSWORD: bears
            POSTGRES_DB: letta
        volumes:
            - bears-letta-postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U bears -d letta"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s

    bears-bifrost:
        depends_on:
            <<: *preflight-depends
        build:
            context: ./services/bifrost
            dockerfile: Dockerfile
        image: ${BIFROST_IMAGE:-bears-bifrost:configured}
        restart: unless-stopped
        environment:
            APP_HOST: ${BIFROST_APP_HOST:-0.0.0.0}
            APP_PORT: ${BIFROST_APP_PORT:-8080}
            LOG_LEVEL: ${BIFROST_LOG_LEVEL:-info}
            LOG_STYLE: ${BIFROST_LOG_STYLE:-json}
            BEARS_METADATA_PORT: ${BIFROST_METADATA_PORT:-8081}
            OPENAI_API_KEY: ${OPENAI_API_KEY:-SETME}
        # `services/bifrost/Dockerfile` bakes config.json into the image. This avoids host bind-mount
        # path mismatches when Compose is driven from a devcontainer or remote Docker daemon.
        # Shell form like upstream Dockerfile. Long `start_period`: Bifrost can be slow on ARM; image default is 5s.
        # `/health` may 503 if config/log/vector store pings fail — set `disable_db_pings_in_health` in config.json.
        # Probe uses `$APP_PORT` (same as the upstream image) so a custom `APP_PORT` still matches the server.
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1:$${APP_PORT:-8080}/health || exit 1",
                ]
            interval: 30s
            timeout: 15s
            retries: 5
            start_period: 120s

    # Redis: required by Letta for memory-repo git locking (used with git-backed memfs).
    bears-redis:
        image: redis:7-alpine
        restart: unless-stopped
        depends_on:
            <<: *preflight-depends
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 5s

    # Serves the same on-disk layout as Letta’s LocalStorageBackend: ~/.letta/memfs/repository/...
    # (shares `bears-letta-data`). The Letta API proxies /v1/git/* here.
    bears-memfs-manager:
        build:
            context: ./services/memfs-manager
            dockerfile: Dockerfile
        restart: unless-stopped
        depends_on:
            <<: *preflight-depends
        environment:
            PORT: ${MEMFS_MANAGER_PORT:-8285}
            BIND: ${MEMFS_MANAGER_BIND:-0.0.0.0}
            MEMFS_BASE: ${MEMFS_BASE:-/root/.letta/memfs/repository}
            # Default Letta self-hosted org id; Memory Manager auto-discovers a sole existing org dir when present.
            MEMFS_DEFAULT_ORG: ${MEMFS_DEFAULT_ORG:-org-00000000-0000-4000-8000-000000000000}
        volumes:
            - bears-letta-data:/root/.letta
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'python -c "import os, urllib.request; urllib.request.urlopen(''http://127.0.0.1:%s/health'' % os.environ.get(''PORT'', ''8285'')).read()"',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    bears-letta:
        # Wrap upstream Letta so the container includes `git`. Letta's MemFS /
        # Context Repository path shells out to git for `/v1/git/...` operations.
        build:
            context: ./services/letta
            dockerfile: Dockerfile
            args:
                LETTA_BASE_IMAGE: ${LETTA_BASE_IMAGE:-letta/letta:latest}
        image: ${LETTA_IMAGE:-bears-letta:latest}
        restart: unless-stopped
        depends_on:
            bears-bifrost:
                condition: service_healthy
            bears-redis:
                condition: service_healthy
            bears-memfs-manager:
                condition: service_healthy
        environment:
            LLM_API_URL: ${LLM_API_URL:-http://bears-bifrost:8080/v1}
            MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
            LETTA_SERVER_PORT: ${LETTA_SERVER_PORT:-8283}
            LETTA_SERVER_HOST: ${LETTA_SERVER_HOST:-0.0.0.0}
            LETTA_SERVER_PASS: ${LETTA_SERVER_PASS:-SETME}
            LETTA_PG_URI: ${LETTA_PG_URI:-SETME}
            LETTA_MEMFS_SERVICE_URL: ${LETTA_MEMFS_SERVICE_URL:-http://bears-memfs-manager:8285}
            LETTA_REDIS_HOST: ${LETTA_REDIS_HOST:-bears-redis}
            LETTA_REDIS_PORT: ${LETTA_REDIS_PORT:-6379}
            OPENAI_API_KEY: ${OPENAI_API_KEY:-SETME}
        volumes:
            - bears-letta-data:/root/.letta
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -sf http://127.0.0.1:$${LETTA_SERVER_PORT:-8283}/v1/health || exit 1",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    bears-codepool:
        # Pre-built image (native deps compile in CI). Build in CI:
        # `.github/workflows/codepool-image.yml` → GHCR. Override for forks: `CODEPOOL_IMAGE=ghcr.io/<org>/codepool:latest`
        # Local smoke/dev build from source: set CODEPOOL_IMAGE=bears-codepool-dev:latest and CODEPOOL_PULL_POLICY=never.
        image: ${CODEPOOL_IMAGE:-ghcr.io/theartificial/codepool:latest}
        # CI pushes :latest to GHCR; production pulls always. Dev/smoke sets CODEPOOL_PULL_POLICY=never
        # with CODEPOOL_IMAGE=bears-codepool-dev:latest so source changes are tested.
        pull_policy: ${CODEPOOL_PULL_POLICY:-always}
        restart: unless-stopped
        depends_on:
            bears-letta:
                condition: service_healthy
        environment:
            PORT: ${POOL_PORT:-3030}
            LETTA_BASE_URL: ${LETTA_BASE_URL:-http://bears-letta:8283}
            # Same credential Letta uses as `LETTA_SERVER_PASS` (Bearer for Letta HTTP API).
            LETTA_API_KEY: ${LETTA_SERVER_PASS:-SETME}
            # Letta Code: use local mirror under ~/.letta, but push through Letta's /v1/git proxy
            # so Letta updates its Postgres memory block cache. Do not set LETTA_MEMFS_SERVICE_URL here.
            LETTA_MEMFS_LOCAL: ${LETTA_MEMFS_LOCAL:-1}
            BEAR_RUNTIME_PROVISIONER: ${BEAR_RUNTIME_PROVISIONER:-local}
            CODEPOOL_INTERNAL_TOKEN: ${CODEPOOL_INTERNAL_TOKEN:-}
            LOG_LEVEL: ${CODEPOOL_LOG_LEVEL:-info}
            LOG_STYLE: ${CODEPOOL_LOG_STYLE:-pretty}
            POOL_TTL_SECS: ${POOL_TTL_SECS:-600}
            POOL_MAX_ENTRIES: ${POOL_MAX_ENTRIES:-256}
        volumes:
            - bears-codepool-letta-home:/home/node/.letta
        # bookworm-slim has no wget/curl; use Node (same runtime as the app).
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'node -e "fetch(''http://127.0.0.1:''+(process.env.PORT||3030)+''/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    # Optional: `docker compose --profile volume-backup up -d` — archive Letta server memfs (`/root/.letta`) to S3-compatible storage (e.g. Scaleway).
    # Set SCALEWAY_BACKUP_* (or generic AWS_* below) in Coolify / `.env`.
    bears-letta-data-backup:
        profiles:
            - volume-backup
        image: offen/docker-volume-backup:v2
        restart: unless-stopped
        environment:
            BACKUP_CRON_EXPRESSION: ${LETTA_VOLUME_BACKUP_CRON:-0 4 * * *}
            BACKUP_FILENAME: "bears-letta-data-%Y-%m-%dT%H-%M-%S.{{ .Extension }}"
            TZ: UTC
            AWS_S3_BUCKET_NAME: ${SCALEWAY_BACKUP_BUCKET:-}
            AWS_S3_PATH: ${SCALEWAY_BACKUP_PREFIX:-bears-stack/volumes/bears-letta-data}
            AWS_ACCESS_KEY_ID: ${SCALEWAY_ACCESS_KEY:-}
            AWS_SECRET_ACCESS_KEY: ${SCALEWAY_SECRET_KEY:-}
            AWS_ENDPOINT: ${SCALEWAY_S3_ENDPOINT:-s3.fr-par.scw.cloud}
            AWS_ENDPOINT_PROTO: https
            AWS_DEFAULT_REGION: ${SCALEWAY_REGION:-fr-par}
        volumes:
            - bears-letta-data:/backup:ro

    bears-den:
        # Pre-built image (Rust is not compiled on the Coolify host — avoids OOM / timeouts). Build in CI:
        # `.github/workflows/den-image.yml` → GHCR. Override for forks: `DEN_IMAGE=ghcr.io/<org>/den:latest`
        # Local smoke/dev build from source: set DEN_IMAGE=bears-den-dev:latest and DEN_PULL_POLICY=never.
        image: ${DEN_IMAGE:-ghcr.io/theartificial/den:latest}
        # Same as bears-codepool: production pulls always. Dev/smoke sets DEN_PULL_POLICY=never
        # with DEN_IMAGE=bears-den-dev:latest so source changes are tested.
        pull_policy: ${DEN_PULL_POLICY:-always}
        restart: unless-stopped
        depends_on:
            bears-letta:
                condition: service_healthy
            bears-codepool:
                condition: service_healthy
        environment:
            # Set `DATABASE_URL` in Coolify / `.env` for Den's Postgres.
            DATABASE_URL: ${DATABASE_URL:-SETME}
            DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-5}
            DB_ACQUIRE_TIMEOUT_SECS: ${DB_ACQUIRE_TIMEOUT_SECS:-3}
            DB_IDLE_TIMEOUT_SECS: ${DB_IDLE_TIMEOUT_SECS:-600}
            SQLX_MIGRATE_IGNORE_MISSING: ${SQLX_MIGRATE_IGNORE_MISSING:-false}
            JWT_SECRET: ${JWT_SECRET:-SETME}
            RUN_WEB: ${RUN_WEB:-true}
            RUN_API: ${RUN_API:-true}
            RUN_WORKERS: ${RUN_WORKERS:-false}
            ACP_GATEWAY_ENABLED: ${ACP_GATEWAY_ENABLED:-true}
            RUST_LOG: ${RUST_LOG:-info}
            PORT: ${DEN_PORT:-3000}
            API_PORT: ${DEN_API_PORT:-3001}
            APP_DISPLAY_NAME: ${APP_DISPLAY_NAME:-BEARS}
            APP_SLUG: ${APP_SLUG:-bears-den}
            WEB_SERVER_URL: ${WEB_SERVER_URL:-${SERVICE_URL_BEARS_DEN:-SETME}}
            API_SERVER_URL: ${API_SERVER_URL:-SETME}
            SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
            SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
            MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@bears.artificial.design}
            MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
            MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
            TEMPLATES_DIR: ${TEMPLATES_DIR:-src/web/templates}
            LETTA_BASE_URL: ${LETTA_BASE_URL:-http://bears-letta:8283}
            LETTA_API_KEY: ${LETTA_SERVER_PASS:-SETME}
            CODEPOOL_BASE_URL: ${CODEPOOL_BASE_URL:-http://bears-codepool:3030}
            CODEPOOL_INTERNAL_TOKEN: ${CODEPOOL_INTERNAL_TOKEN:-}
            # Optional on Den: `/status` probes Letta’s DB and Bifrost when set (see services/den/docs/infrastructure-and-ops.md).
            LETTA_PG_URI: ${LETTA_PG_URI:-SETME}
            BIFROST_BASE_URL: ${BIFROST_BASE_URL:-http://bears-bifrost:8080}
            BIFROST_METADATA_URL: ${BIFROST_METADATA_URL:-http://bears-bifrost:8081/bears/models}
            LLM_API_URL: ${LLM_API_URL:-http://bears-bifrost:8080/v1}
            OPENAI_API_KEY: ${OPENAI_API_KEY:-SETME}
            # Same as Letta / preflight: Memory Manager (git smart-HTTP + JSON management API) for private-memory UI.
            LETTA_MEMFS_SERVICE_URL: ${LETTA_MEMFS_SERVICE_URL:-http://bears-memfs-manager:8285}
            S3_ENDPOINT: ${S3_ENDPOINT:-}
            S3_BUCKET: ${S3_BUCKET:-}
            S3_REGION: ${S3_REGION:-garage}
            S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
            S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
            S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
            S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
            GITHUB_PACKAGES_TOKEN: ${GITHUB_PACKAGES_TOKEN:-}
            GHCR_PACKAGES_OWNER: ${GHCR_PACKAGES_OWNER:-}
            GHCR_PACKAGES_OWNER_KIND: ${GHCR_PACKAGES_OWNER_KIND:-}
        expose:
            - "3000"
            - "3001"

volumes:
    # Used only when `bears-postgres` runs (`--profile bundled`).
    bears-postgres-data:
    bears-letta-postgres-data:
    bears-letta-data:
    bears-codepool-letta-home:
