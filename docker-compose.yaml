# BEARS stack — single Docker Compose project with one shared network (`bear-stack`).
#
# Recommended for Coolify: Add Resource → Docker Compose → this repository,
# Base Directory: `.` (repo root), Compose file: `docker-compose.yaml`.
#
# Service DNS names (use these in env defaults and cross-service URLs):
#   bear-postgres (optional, profile `bundled`), bear-bifrost, bear-letta, bear-codepool, bear-den
#
# PostgreSQL: set **`DATABASE_URL`** for `bear-den` (managed DB — preferred in Coolify). Optional
# bundled Postgres uses **fixed** credentials in this file (no `POSTGRES_*` env interpolation) so
# orchestrators do not invent separate `POSTGRES_USER` / `POSTGRES_PASSWORD` / `POSTGRES_DB` fields.
# Enable the bundled container with profile `bundled`:
#   COMPOSE_PROFILES=bundled
#   docker compose --profile bundled up -d
#
# See docs/deployment/DEPLOYMENT.md and per-service COOLIFY_DEPLOY.md files.

name: bear-stack

services:
  bear-postgres:
    profiles:
      - bundled
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Fixed dev defaults (match `DATABASE_URL` default on `bear-den`). For production, prefer a
      # managed database and `DATABASE_URL` only; or fork and change these literals.
      POSTGRES_USER: bears
      POSTGRES_PASSWORD: bears
      POSTGRES_DB: den
    volumes:
      - bear-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bears -d den"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  bear-bifrost:
    image: maximhq/bifrost:v1.4.22
    restart: unless-stopped
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      LOG_LEVEL: info
      LOG_STYLE: json
    volumes:
      - ./services/bifrost/config.json:/app/data/config.json:ro
    # Shell form like upstream Dockerfile. Long `start_period`: Bifrost can be slow on ARM; image default is 5s.
    # `/health` may 503 if config/log/vector store pings fail — set `disable_db_pings_in_health` in config.json.
    # Probe uses `$APP_PORT` (same as the upstream image) so a custom `APP_PORT` still matches the server.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1:$${APP_PORT:-8080}/health || exit 1",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  bear-letta:
    image: letta/letta:latest
    restart: unless-stopped
    depends_on:
      bear-bifrost:
        condition: service_healthy
    environment:
      LLM_API_URL: http://bear-bifrost:8080/v1
      MODEL_NAME: ${MODEL_NAME:-gpt-4}
      LETTA_SERVER_PORT: "8283"
      LETTA_SERVER_HOST: "0.0.0.0"
      LETTA_SERVER_PASS: ${LETTA_SERVER_PASS:?set LETTA_SERVER_PASS}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - bear-letta-data:/root/.letta
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8283/v1/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bear-codepool:
    build:
      context: ./codepool
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      bear-letta:
        condition: service_healthy
    environment:
      PORT: "3030"
      LETTA_BASE_URL: ${LETTA_BASE_URL:-http://bear-letta:8283}
      # Same credential Letta uses as `LETTA_SERVER_PASS` (Bearer for Letta HTTP API).
      LETTA_API_KEY: ${LETTA_SERVER_PASS}
      CODEPOOL_INTERNAL_TOKEN: ${CODEPOOL_INTERNAL_TOKEN:-}
      POOL_TTL_SECS: ${POOL_TTL_SECS:-600}
      POOL_MAX_ENTRIES: ${POOL_MAX_ENTRIES:-256}
    volumes:
      - bear-codepool-letta-home:/home/node/.letta
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1:3030/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bear-den:
    # Pre-built image (Rust is not compiled on the Coolify host — avoids OOM / timeouts). Build in CI:
    # `.github/workflows/den-image.yml` → GHCR. Override for forks: `DEN_IMAGE=ghcr.io/<org>/den:latest`
    # To build Den from source locally: `docker compose -f docker-compose.yaml -f docker-compose.den-src.yaml build bear-den`
    image: ${DEN_IMAGE:-ghcr.io/theartificial/den:latest}
    restart: unless-stopped
    depends_on:
      bear-letta:
        condition: service_healthy
      bear-codepool:
        condition: service_healthy
    environment:
      # Set `DATABASE_URL` in Coolify / `.env` for managed Postgres. Omitted → default matches bundled
      # `bear-postgres` literals above (`bears`/`bears`/`den` on host `bear-postgres`).
      DATABASE_URL: ${DATABASE_URL:-postgres://bears:bears@bear-postgres:5432/den?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      RUN_WEB: ${RUN_WEB:-true}
      RUN_API: ${RUN_API:-false}
      RUN_WORKERS: ${RUN_WORKERS:-false}
      PORT: ${DEN_PORT:-3000}
      WEB_SERVER_URL: ${WEB_SERVER_URL:-http://localhost:3000}
      LETTA_BASE_URL: ${LETTA_BASE_URL:-http://bear-letta:8283}
      LETTA_API_KEY: ${LETTA_SERVER_PASS}
      CODEPOOL_BASE_URL: ${CODEPOOL_BASE_URL:-http://bear-codepool:3030}
      CODEPOOL_INTERNAL_TOKEN: ${CODEPOOL_INTERNAL_TOKEN:-}
    ports:
      - "${DEN_PUBLISH_PORT:-3000}:3000"

volumes:
  # Used only when `bear-postgres` runs (`--profile bundled`).
  bear-postgres-data:
  bear-letta-data:
  bear-codepool-letta-home:
