services:
  letta:
    image: lettaai/letta:latest
    ports:
      - "3000:3000"
    environment:
      - ONYX_URL=http://onyx:8000
      - LLM_API_URL=http://litellm:8000/v1
      - MODEL_NAME=gpt-4
      - API_KEY=${LETTA_API_KEY}
    depends_on:
      - onyx
      - litellm
    networks:
      - letta_net

  onyx:
    image: onyxai/onyx:latest
    ports:
      - "8000:8000"
    environment:
      - VECTOR_DB=qdrant
      - QDRANT_URL=http://qdrant:6333
      - ONYX_CONFIG_PATH=/config/onyx.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY}  # Needed by Onyx for embeddings
    depends_on:
      - qdrant
    volumes:
      - ./onyx_config:/config:ro
    networks:
      - letta_net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - letta_net

  litellm:
    image: ghcr.io/berriai/litellm:main
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LITELLM_MODEL_NAME=openai/gpt-4
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    networks:
      - letta_net

volumes:
  qdrant_data:

networks:
  letta_net:
    driver: bridge
