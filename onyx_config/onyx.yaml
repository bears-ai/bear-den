vector_db:
  type: qdrant
  url: http://qdrant:6333

embedding:
  provider: openai
  model: text-embedding-ada-002
  api_base: http://litellm:8000/v1
  api_key_env: OPENAI_API_KEY

memory_collections:
  - name: long_term_memory
    description: "Persistent memory for Letta"
    chunk_size: 512
    overlap: 50
    metadata_fields:
      - user_id
      - timestamp
      - source
