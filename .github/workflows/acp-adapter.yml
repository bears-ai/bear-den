name: ACP adapter – build binaries

on:
    push:
        branches: [main]
        paths:
            - "tools/bears-acp-adapter/**"
            - ".github/workflows/acp-adapter.yml"
    pull_request:
        paths:
            - "tools/bears-acp-adapter/**"
            - ".github/workflows/acp-adapter.yml"
    workflow_dispatch:
    release:
        types: [created]

env:
    CARGO_TERM_COLOR: always

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.artifact_name }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-14
                      target: aarch64-apple-darwin
                      artifact_name: bears-acp-adapter-aarch64-apple-darwin
                      binary_name: bears-acp-adapter
                    - os: ubuntu-24.04
                      target: x86_64-unknown-linux-gnu
                      artifact_name: bears-acp-adapter-x86_64-unknown-linux-gnu
                      binary_name: bears-acp-adapter
                    - os: windows-2022
                      target: x86_64-pc-windows-msvc
                      artifact_name: bears-acp-adapter-x86_64-pc-windows-msvc
                      binary_name: bears-acp-adapter.exe

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Cargo
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: tools/bears-acp-adapter -> target
                  key: ${{ matrix.target }}

            - name: Build adapter
              run: cargo build --release --target ${{ matrix.target }} --manifest-path tools/bears-acp-adapter/Cargo.toml

            - name: Stage artifact (Unix)
              if: runner.os != 'Windows'
              run: |
                  mkdir -p dist
                  cp "tools/bears-acp-adapter/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}"
                  chmod +x "dist/${{ matrix.artifact_name }}"

            - name: Stage artifact (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path dist | Out-Null
                  Copy-Item "tools/bears-acp-adapter/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}.exe"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: dist/*
                  if-no-files-found: error

            - name: Attach binary to GitHub release
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/*
