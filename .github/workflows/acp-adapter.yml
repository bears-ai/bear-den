name: ACP adapter – build binaries

on:
    push:
        branches: [main]
        tags:
            - "v*"
            - "bears-acp-adapter/v*"
        paths:
            - "tools/bears-acp-adapter/**"
            - "packaging/macos/**"
            - ".github/workflows/acp-adapter.yml"
    pull_request:
        paths:
            - "tools/bears-acp-adapter/**"
            - "packaging/macos/**"
            - ".github/workflows/acp-adapter.yml"
    workflow_dispatch:
        inputs:
            create_release_from_cargo:
                description: "Create/reuse bears-acp-adapter/v<version> from Cargo.toml and publish update site. Pushes to main do this automatically when the tag does not exist."
                type: boolean
                default: false
            publish_update_site:
                description: "Publish the generated update payload to the public gh-pages update site"
                type: boolean
                default: false
            update_channel:
                description: "Update channel to publish when manually dispatching without create_release_from_cargo"
                type: choice
                options: [stable, beta]
                default: beta
            release_notes_url:
                description: "Optional release notes URL for manually generated update manifests"
                type: string
                required: false
    release:
        # `published` covers the user-visible release event, including drafts that are published later.
        # `created` is easy to miss with draft release flows and can cause release-only jobs to skip during manual reruns.
        types: [published]

env:
    CARGO_TERM_COLOR: always
    BEARS_ACP_ADAPTER_MACOS_INSTALLER_IDENTITY: ${{ vars.MACOS_INSTALLER_CERT_IDENTITY_PUBLIC }}
    BEARS_ACP_ADAPTER_MACOS_INSTALLER_TEAM_ID: ${{ vars.MACOS_INSTALLER_TEAM_ID }}

permissions:
    contents: write

jobs:
    prepare-release:
        name: Resolve adapter release metadata
        runs-on: ubuntu-24.04
        outputs:
            update_version: ${{ steps.resolve.outputs.update_version }}
            update_channel: ${{ steps.resolve.outputs.update_channel }}
            release_tag: ${{ steps.resolve.outputs.release_tag }}
            release_notes_url: ${{ steps.resolve.outputs.release_notes_url }}
            publish_update_site: ${{ steps.resolve.outputs.publish_update_site }}

        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Resolve/create release metadata
              id: resolve
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -eu

                  cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' tools/bears-acp-adapter/Cargo.toml | head -n 1)"
                  if [ -z "$cargo_version" ]; then
                    echo "::error::Could not read tools/bears-acp-adapter/Cargo.toml version"
                    exit 1
                  fi

                  tag=""
                  release_notes_url="${{ inputs.release_notes_url }}"
                  publish_update_site="false"
                  create_release="false"

                  if [ "${{ github.event_name }}" = "release" ]; then
                    tag="${{ github.event.release.tag_name }}"
                    release_notes_url="${{ github.event.release.html_url }}"
                    publish_update_site="true"
                  elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
                    tag="${GITHUB_REF_NAME}"
                    release_notes_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
                    publish_update_site="true"
                    create_release="true"
                  elif [ "${{ inputs.create_release_from_cargo }}" = "true" ]; then
                    tag="bears-acp-adapter/v${cargo_version}"
                    release_notes_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}"
                    publish_update_site="true"
                    create_release="true"
                  elif [ "${{ github.event_name }}" = "push" ] && [ "${GITHUB_REF_TYPE:-}" = "branch" ] && [ "${GITHUB_REF_NAME:-}" = "main" ]; then
                    candidate_tag="bears-acp-adapter/v${cargo_version}"
                    if git ls-remote --exit-code --tags origin "refs/tags/${candidate_tag}" >/dev/null 2>&1; then
                      echo "Cargo version ${cargo_version} already has tag ${candidate_tag}; not creating a release from this push."
                    else
                      tag="$candidate_tag"
                      release_notes_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}"
                      publish_update_site="true"
                      create_release="true"
                      echo "Cargo version ${cargo_version} has no ${candidate_tag} tag; this push will create and publish it."
                    fi
                  elif [ "${{ inputs.publish_update_site }}" = "true" ]; then
                    publish_update_site="true"
                  fi

                  if [ -n "$tag" ]; then
                    version="${tag##*/}"
                    version="${version#v}"
                  else
                    version="$cargo_version"
                  fi

                  case "$version" in
                    [0-9]*.[0-9]*.[0-9]*) ;;
                    *) echo "::error::Resolved adapter version '$version' is not semver-like"; exit 1 ;;
                  esac

                  if [ "${{ github.event_name }}" = "release" ]; then
                    if [ "${{ github.event.release.prerelease }}" = "true" ]; then
                      channel="beta"
                    else
                      channel="stable"
                    fi
                  elif [ -n "$tag" ]; then
                    case "$version" in
                      *-*) channel="beta" ;;
                      *) channel="stable" ;;
                    esac
                  else
                    channel="${{ inputs.update_channel }}"
                  fi

                  if [ "$create_release" = "true" ]; then
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                    if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
                      echo "Tag already exists: ${tag}"
                    else
                      git tag -a "$tag" -m "BEARS ACP adapter ${version}"
                      git push origin "$tag"
                    fi

                    if gh release view "$tag" >/dev/null 2>&1; then
                      echo "GitHub Release already exists: ${tag}"
                    else
                      prerelease_flag=""
                      case "$channel" in
                        beta) prerelease_flag="--prerelease" ;;
                      esac
                      gh release create "$tag" \
                        --title "BEARS ACP adapter ${version}" \
                        --notes "BEARS ACP adapter ${version}" \
                        ${prerelease_flag}
                    fi
                  fi

                  if [ -z "$release_notes_url" ] && [ -n "$tag" ]; then
                    release_notes_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}"
                  fi

                  echo "update_version=$version" >> "$GITHUB_OUTPUT"
                  echo "update_channel=$channel" >> "$GITHUB_OUTPUT"
                  echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
                  echo "release_notes_url=$release_notes_url" >> "$GITHUB_OUTPUT"
                  echo "publish_update_site=$publish_update_site" >> "$GITHUB_OUTPUT"

                  echo "Resolved adapter version: $version"
                  echo "Resolved update channel: $channel"
                  echo "Resolved release tag: ${tag:-<none>}"
                  echo "Publish update site: $publish_update_site"

    build:
        name: Build ${{ matrix.artifact_name }}
        runs-on: ${{ matrix.os }}
        needs: prepare-release
        env:
            UPDATE_VERSION: ${{ needs.prepare-release.outputs.update_version }}
            BEARS_ACP_ADAPTER_RELEASE_VERSION: ${{ needs.prepare-release.outputs.update_version }}
            RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-14
                      target: aarch64-apple-darwin
                      artifact_name: bears-acp-adapter-aarch64-apple-darwin
                      binary_name: bears-acp-adapter
                    - os: ubuntu-22.04
                      target: x86_64-unknown-linux-gnu
                      artifact_name: bears-acp-adapter-x86_64-unknown-linux-gnu
                      binary_name: bears-acp-adapter
                    - os: ubuntu-22.04-arm
                      target: aarch64-unknown-linux-gnu
                      artifact_name: bears-acp-adapter-aarch64-unknown-linux-gnu
                      binary_name: bears-acp-adapter

        steps:
            - uses: actions/checkout@v5

            - name: Install Rust toolchain
              run: |
                  rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
                  rustup default stable

            - name: Cache Cargo
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      tools/bears-acp-adapter/target
                  key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ hashFiles('tools/bears-acp-adapter/Cargo.lock') }}
                  restore-keys: |
                      cargo-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-

            - name: Build adapter
              run: cargo build --release --target ${{ matrix.target }} --manifest-path tools/bears-acp-adapter/Cargo.toml

            - name: Stage artifact (Unix)
              if: runner.os != 'Windows'
              run: |
                  mkdir -p dist
                  cp "tools/bears-acp-adapter/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}"
                  chmod +x "dist/${{ matrix.artifact_name }}"

            - name: Check Linux glibc compatibility
              if: runner.os == 'Linux'
              run: |
                  set -eu
                  artifact="dist/${{ matrix.artifact_name }}"
                  versions="$(objdump -T "$artifact" | sed -n 's/.*GLIBC_\([0-9][0-9.]*\).*/\1/p' | sort -Vu)"
                  required="$(printf '%s\n' "$versions" | tail -n 1)"
                  echo "Detected GLIBC symbol versions:"
                  printf '%s\n' "$versions"
                  case "$required" in
                    "") echo "No dynamic GLIBC requirement detected." ;;
                    2.3[0-5]|2.[0-2][0-9]|1.*|0.*) echo "Maximum GLIBC requirement: $required" ;;
                    *) echo "::error::Linux artifact requires GLIBC_$required; build on an older runner or use a more compatible target"; exit 1 ;;
                  esac

            - name: Stage artifact (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path dist | Out-Null
                  Copy-Item "tools/bears-acp-adapter/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}.exe"

            - name: Upload build artifact
              uses: actions/upload-artifact@v5
              with:
                  name: ${{ matrix.artifact_name }}
                  path: dist/*
                  if-no-files-found: error

    macos-pkg:
        name: Build macOS arm64 installer package
        runs-on: macos-14
        needs: [prepare-release, build]

        env:
            UPDATE_VERSION: ${{ needs.prepare-release.outputs.update_version }}
            UPDATE_CHANNEL: ${{ needs.prepare-release.outputs.update_channel }}
            UPDATE_RELEASE_NOTES_URL: ${{ needs.prepare-release.outputs.release_notes_url }}
            BEARS_ACP_ADAPTER_RELEASE_VERSION: ${{ needs.prepare-release.outputs.update_version }}
            RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
            PUBLISH_UPDATE_SITE: ${{ needs.prepare-release.outputs.publish_update_site }}
            MACOS_APPLICATION_CERT_IDENTITY: ${{ secrets.MACOS_APPLICATION_CERT_IDENTITY }}
            MACOS_INSTALLER_CERT_IDENTITY: ${{ secrets.MACOS_INSTALLER_CERT_IDENTITY }}
            MACOS_CERTIFICATES_P12_BASE64: ${{ secrets.MACOS_CERTIFICATES_P12_BASE64 }}
            MACOS_CERTIFICATES_PASSWORD: ${{ secrets.MACOS_CERTIFICATES_PASSWORD }}
            MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
            APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
            APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
            APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

        steps:
            - uses: actions/checkout@v5

            - name: Download arm64 macOS binary
              uses: actions/download-artifact@v5
              with:
                  name: bears-acp-adapter-aarch64-apple-darwin
                  path: dist/input/aarch64-apple-darwin

            - name: Stage arm64 macOS binary
              run: |
                  mkdir -p dist/macos
                  cp dist/input/aarch64-apple-darwin/bears-acp-adapter-aarch64-apple-darwin dist/macos/bears-acp-adapter
                  chmod +x dist/macos/bears-acp-adapter
                  file dist/macos/bears-acp-adapter

            - name: Download Linux binaries for public update payload
              if: env.PUBLISH_UPDATE_SITE == 'true'
              uses: actions/download-artifact@v5
              with:
                  pattern: bears-acp-adapter-*-unknown-linux-gnu
                  path: dist/input/linux
                  merge-multiple: true

            - name: Import Apple signing certificates
              if: env.MACOS_CERTIFICATES_P12_BASE64 != ''
              run: |
                  security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build-signing.keychain-db
                  security set-keychain-settings -lut 21600 build-signing.keychain-db
                  security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build-signing.keychain-db
                  echo "$MACOS_CERTIFICATES_P12_BASE64" | base64 -D > certificates.p12
                  security import certificates.p12 \
                    -k build-signing.keychain-db \
                    -P "$MACOS_CERTIFICATES_PASSWORD" \
                    -T /usr/bin/codesign \
                    -T /usr/bin/productbuild
                  security list-keychains -d user -s build-signing.keychain-db login.keychain-db
                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" build-signing.keychain-db
                  security find-identity -v -p codesigning build-signing.keychain-db
                  security find-identity -v -p basic build-signing.keychain-db

            - name: Build macOS package
              run: |
                  ./packaging/macos/build-pkg.sh \
                    --binary dist/macos/bears-acp-adapter \
                    --version "$UPDATE_VERSION" \
                    --output dist/macos/bears-acp-adapter-aarch64-apple-darwin.pkg

            - name: Prepare App Store Connect API key
              if: env.APP_STORE_CONNECT_API_KEY_BASE64 != ''
              run: |
                  echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -D > app-store-connect-api-key.p8
                  chmod 600 app-store-connect-api-key.p8
                  echo "APP_STORE_CONNECT_API_KEY_PATH=$PWD/app-store-connect-api-key.p8" >> "$GITHUB_ENV"

            - name: Notarize and staple macOS package
              if: env.APP_STORE_CONNECT_API_KEY_BASE64 != '' && env.MACOS_INSTALLER_CERT_IDENTITY != ''
              run: ./packaging/macos/notarize.sh --pkg dist/macos/bears-acp-adapter-aarch64-apple-darwin.pkg

            - name: Generate public update payload
              if: env.PUBLISH_UPDATE_SITE == 'true'
              run: |
                  site_dir="dist/update-site/bears-acp-adapter/$UPDATE_CHANNEL"
                  site_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/bears-acp-adapter/$UPDATE_CHANNEL"
                  mkdir -p "$site_dir"

                  macos_pkg_name="bears-acp-adapter-aarch64-apple-darwin.pkg"
                  macos_pkg_path="$site_dir/$macos_pkg_name"
                  cp dist/macos/bears-acp-adapter-aarch64-apple-darwin.pkg "$macos_pkg_path"
                  ./packaging/macos/generate-update-manifest.sh \
                    --pkg "$macos_pkg_path" \
                    --output "$site_dir/aarch64-apple-darwin.json" \
                    --base-url "$site_url" \
                    --channel "$UPDATE_CHANNEL" \
                    --version "$UPDATE_VERSION" \
                    --target aarch64-apple-darwin \
                    --release-notes-url "$UPDATE_RELEASE_NOTES_URL"

                  macos_sha256="$(shasum -a 256 "$macos_pkg_path" | awk '{print $1}')"
                  python3 - "$site_dir/macos.json" "$UPDATE_VERSION" "$site_url/$macos_pkg_name" "$macos_sha256" "$UPDATE_RELEASE_NOTES_URL" <<'PY'
                  import json
                  import pathlib
                  import sys

                  output_path = pathlib.Path(sys.argv[1])
                  manifest = {
                      "version": sys.argv[2],
                      "pkg_url": sys.argv[3],
                      "sha256": sys.argv[4],
                      "release_notes_url": sys.argv[5],
                  }
                  output_path.write_text(json.dumps(manifest, indent=2) + "\n")
                  PY

                  for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
                    asset="bears-acp-adapter-$target"
                    cp "dist/input/linux/$asset" "$site_dir/$asset"
                    ./packaging/macos/generate-update-manifest.sh \
                      --binary "$site_dir/$asset" \
                      --output "$site_dir/$target.json" \
                      --base-url "$site_url" \
                      --channel "$UPDATE_CHANNEL" \
                      --version "$UPDATE_VERSION" \
                      --target "$target" \
                      --release-notes-url "$UPDATE_RELEASE_NOTES_URL"
                  done

                  build_datetime="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
                  python3 - "$site_dir" "$UPDATE_VERSION" "$UPDATE_CHANNEL" "$build_datetime" "$UPDATE_RELEASE_NOTES_URL" <<'PY'
                  import html
                  import json
                  import pathlib
                  import sys
                  from urllib.parse import urlparse

                  site_dir = pathlib.Path(sys.argv[1])
                  version = sys.argv[2]
                  channel = sys.argv[3]
                  build_datetime = sys.argv[4]
                  release_notes_url = sys.argv[5]

                  def e(value):
                      return html.escape(str(value), quote=True)

                  def format_size(value):
                      try:
                          size = int(value)
                      except (TypeError, ValueError):
                          return "unknown"
                      units = ["B", "KiB", "MiB", "GiB"]
                      amount = float(size)
                      unit = units[0]
                      for unit in units:
                          if amount < 1024 or unit == units[-1]:
                              break
                          amount /= 1024
                      if unit == "B":
                          return f"{size} B"
                      return f"{amount:.1f} {unit}"

                  rows = []
                  for manifest_path in sorted(site_dir.glob("*.json")):
                      manifest = json.loads(manifest_path.read_text())
                      for target, data in sorted(manifest.get("platforms", {}).items()):
                          asset_url = data.get("pkg_url") or data.get("binary_url") or ""
                          asset_name = pathlib.PurePosixPath(urlparse(asset_url).path).name if asset_url else ""
                          rows.append({
                              "target": target,
                              "manifest": manifest_path.name,
                              "asset": asset_name,
                              "size": format_size(data.get("size")),
                              "sha256": data.get("sha256", ""),
                          })

                  table_rows = "\n".join(
                      "<tr>"
                      f"<td><code>{e(row['target'])}</code></td>"
                      f"<td><a href=\"{e(row['manifest'])}\">{e(row['manifest'])}</a></td>"
                      f"<td><a href=\"{e(row['asset'])}\">{e(row['asset'])}</a></td>"
                      f"<td>{e(row['size'])}</td>"
                      f"<td><code>{e(row['sha256'])}</code></td>"
                      "</tr>"
                      for row in rows
                  ) or '<tr><td colspan="5">No platform manifests were generated.</td></tr>'

                  release_notes = (
                      f'<p><a href="{e(release_notes_url)}">Release notes</a></p>'
                      if release_notes_url
                      else ""
                  )

                  channel_page = f"""<!doctype html>
                  <html lang="en">
                  <head>
                    <meta charset="utf-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1">
                    <title>BEARS ACP adapter {e(channel)} {e(version)}</title>
                    <style>
                      body {{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.5; margin: 2rem; max-width: 72rem; }}
                      table {{ border-collapse: collapse; width: 100%; }}
                      th, td {{ border: 1px solid #d0d7de; padding: 0.5rem; text-align: left; vertical-align: top; }}
                      th {{ background: #f6f8fa; }}
                      code {{ word-break: break-all; }}
                    </style>
                  </head>
                  <body>
                    <h1>BEARS ACP adapter</h1>
                    <dl>
                      <dt>Channel</dt><dd><code>{e(channel)}</code></dd>
                      <dt>Version</dt><dd><code>{e(version)}</code></dd>
                      <dt>Build datetime</dt><dd><time datetime="{e(build_datetime)}">{e(build_datetime)} UTC</time></dd>
                    </dl>
                    {release_notes}
                    <h2>Downloads and manifests</h2>
                    <table>
                      <thead><tr><th>Target</th><th>Manifest</th><th>Asset</th><th>Size</th><th>SHA-256</th></tr></thead>
                      <tbody>{table_rows}</tbody>
                    </table>
                  </body>
                  </html>
                  """
                  (site_dir / "index.html").write_text(channel_page)

                  root_dir = site_dir.parent
                  root_page = f"""<!doctype html>
                  <html lang="en">
                  <head>
                    <meta charset="utf-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1">
                    <meta http-equiv="refresh" content="0; url={e(channel)}/">
                    <title>BEARS ACP adapter</title>
                  </head>
                  <body>
                    <h1>BEARS ACP adapter</h1>
                    <p>Latest published channel: <a href="{e(channel)}/"><code>{e(channel)}</code> {e(version)}</a></p>
                    <p>Build datetime: <time datetime="{e(build_datetime)}">{e(build_datetime)} UTC</time></p>
                  </body>
                  </html>
                  """
                  (root_dir / "index.html").write_text(root_page)
                  PY

            - name: Validate public update payload metadata
              if: env.PUBLISH_UPDATE_SITE == 'true'
              run: |
                  python3 - "dist/update-site/bears-acp-adapter/$UPDATE_CHANNEL" "$UPDATE_VERSION" <<'PY'
                  import json
                  import pathlib
                  import sys

                  root = pathlib.Path(sys.argv[1])
                  expected = sys.argv[2]
                  failed = False
                  for manifest_path in sorted(root.glob("*.json")):
                      manifest = json.loads(manifest_path.read_text())
                      actual = manifest.get("version")
                      if actual != expected:
                          print(f"::error file={manifest_path}::manifest version {actual!r} != expected {expected!r}")
                          failed = True
                      if not manifest.get("platforms"):
                          print(f"::error file={manifest_path}::manifest has no platforms")
                          failed = True
                  if failed:
                      raise SystemExit(1)
                  PY

            - name: Upload public update payload artifact
              if: env.PUBLISH_UPDATE_SITE == 'true'
              uses: actions/upload-artifact@v5
              with:
                  name: bears-acp-adapter-update-site
                  path: dist/update-site
                  if-no-files-found: error

            - name: Upload macOS package artifact
              uses: actions/upload-artifact@v5
              with:
                  name: bears-acp-adapter-aarch64-apple-darwin-pkg
                  path: dist/macos/bears-acp-adapter-aarch64-apple-darwin.pkg
                  if-no-files-found: error

    upload-release-assets:
        name: Attach ACP adapter assets to GitHub release
        runs-on: ubuntu-24.04
        needs: [prepare-release, build, macos-pkg]
        if: needs.prepare-release.outputs.release_tag != ''
        env:
            RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
            UPDATE_CHANNEL: ${{ needs.prepare-release.outputs.update_channel }}
            PUBLISH_UPDATE_SITE: ${{ needs.prepare-release.outputs.publish_update_site }}
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - name: Download macOS binary release asset
              uses: actions/download-artifact@v5
              with:
                  name: bears-acp-adapter-aarch64-apple-darwin
                  path: release-assets

            - name: Download Linux binary release assets
              uses: actions/download-artifact@v5
              with:
                  pattern: bears-acp-adapter-*-unknown-linux-gnu
                  path: release-assets
                  merge-multiple: true

            - name: Download macOS package release asset
              uses: actions/download-artifact@v5
              with:
                  name: bears-acp-adapter-aarch64-apple-darwin-pkg
                  path: release-assets

            - name: Download public update payload release assets
              if: env.PUBLISH_UPDATE_SITE == 'true'
              uses: actions/download-artifact@v5
              with:
                  name: bears-acp-adapter-update-site
                  path: dist/update-site

            - name: Stage release assets
              run: |
                  set -eu
                  if [ "$PUBLISH_UPDATE_SITE" = "true" ]; then
                    manifest="dist/update-site/bears-acp-adapter/${UPDATE_CHANNEL}/aarch64-apple-darwin.json"
                    cp "$manifest" release-assets/aarch64-apple-darwin.json
                  fi
                  find release-assets -maxdepth 1 -type f -print | sort

            - name: Attach assets to GitHub release
              run: |
                  set -eu
                  gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

                  attempt=1
                  max_attempts=6
                  while true; do
                    if gh release upload "$RELEASE_TAG" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"; then
                      break
                    fi

                    if [ "$attempt" -ge "$max_attempts" ]; then
                      echo "::error::Failed to upload release assets after ${max_attempts} attempts"
                      exit 1
                    fi

                    sleep_for=$((attempt * 10))
                    echo "Release asset upload failed; retrying in ${sleep_for}s (attempt ${attempt}/${max_attempts})"
                    sleep "$sleep_for"
                    attempt=$((attempt + 1))
                  done

    publish-update-site:
        name: Publish ACP adapter update site
        runs-on: ubuntu-24.04
        needs: [prepare-release, macos-pkg]
        if: needs.prepare-release.outputs.publish_update_site == 'true'

        steps:
            - name: Download public update payload
              uses: actions/download-artifact@v5
              with:
                  name: bears-acp-adapter-update-site
                  path: dist/update-site

            - name: Publish to gh-pages branch
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -eu
                  work_dir="$(mktemp -d)"
                  repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  if git ls-remote --exit-code --heads "$repo_url" gh-pages >/dev/null 2>&1; then
                    git clone --depth 1 --branch gh-pages "$repo_url" "$work_dir"
                  else
                    git clone --depth 1 "$repo_url" "$work_dir"
                    cd "$work_dir"
                    git checkout --orphan gh-pages
                    git rm -rf . >/dev/null 2>&1 || true
                    cd "$GITHUB_WORKSPACE"
                  fi
                  cp -R dist/update-site/. "$work_dir/"
                  cd "$work_dir"
                  touch .nojekyll
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add .
                  if git diff --cached --quiet; then
                    echo "No update site changes to publish."
                    exit 0
                  fi
                  git commit -m "Publish BEARS ACP adapter update site"
                  git push origin gh-pages
