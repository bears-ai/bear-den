name: ACP adapter – build binaries

on:
    push:
        branches: [main]
        paths:
            - "tools/bears-acp-adapter/**"
            - "packaging/macos/**"
            - ".github/workflows/acp-adapter.yml"
    pull_request:
        paths:
            - "tools/bears-acp-adapter/**"
            - "packaging/macos/**"
            - ".github/workflows/acp-adapter.yml"
    workflow_dispatch:
    release:
        types: [created]

env:
    CARGO_TERM_COLOR: always
    BEARS_ACP_ADAPTER_MACOS_INSTALLER_IDENTITY: ${{ vars.MACOS_INSTALLER_CERT_IDENTITY_PUBLIC }}
    BEARS_ACP_ADAPTER_MACOS_INSTALLER_TEAM_ID: ${{ vars.MACOS_INSTALLER_TEAM_ID }}

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.artifact_name }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-14
                      target: aarch64-apple-darwin
                      artifact_name: bears-acp-adapter-aarch64-apple-darwin
                      binary_name: bears-acp-adapter
                    - os: ubuntu-24.04
                      target: x86_64-unknown-linux-gnu
                      artifact_name: bears-acp-adapter-x86_64-unknown-linux-gnu
                      binary_name: bears-acp-adapter
                    - os: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                      artifact_name: bears-acp-adapter-aarch64-unknown-linux-gnu
                      binary_name: bears-acp-adapter

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Cargo
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: tools/bears-acp-adapter -> target
                  key: ${{ matrix.target }}

            - name: Build adapter
              run: cargo build --release --target ${{ matrix.target }} --manifest-path tools/bears-acp-adapter/Cargo.toml

            - name: Stage artifact (Unix)
              if: runner.os != 'Windows'
              run: |
                  mkdir -p dist
                  cp "tools/bears-acp-adapter/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}"
                  chmod +x "dist/${{ matrix.artifact_name }}"

            - name: Stage artifact (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path dist | Out-Null
                  Copy-Item "tools/bears-acp-adapter/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}.exe"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: dist/*
                  if-no-files-found: error

            - name: Attach binary to GitHub release
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/*

    macos-pkg:
        name: Build macOS arm64 installer package
        runs-on: macos-14
        needs: build

        env:
            MACOS_APPLICATION_CERT_IDENTITY: ${{ secrets.MACOS_APPLICATION_CERT_IDENTITY }}
            MACOS_INSTALLER_CERT_IDENTITY: ${{ secrets.MACOS_INSTALLER_CERT_IDENTITY }}
            MACOS_CERTIFICATES_P12_BASE64: ${{ secrets.MACOS_CERTIFICATES_P12_BASE64 }}
            MACOS_CERTIFICATES_PASSWORD: ${{ secrets.MACOS_CERTIFICATES_PASSWORD }}
            MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
            APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
            APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
            APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

        steps:
            - uses: actions/checkout@v4

            - name: Download arm64 macOS binary
              uses: actions/download-artifact@v4
              with:
                  name: bears-acp-adapter-aarch64-apple-darwin
                  path: dist/input/aarch64-apple-darwin

            - name: Stage arm64 macOS binary
              run: |
                  mkdir -p dist/macos
                  cp dist/input/aarch64-apple-darwin/bears-acp-adapter-aarch64-apple-darwin dist/macos/bears-acp-adapter
                  chmod +x dist/macos/bears-acp-adapter
                  file dist/macos/bears-acp-adapter

            - name: Import Apple signing certificates
              if: env.MACOS_CERTIFICATES_P12_BASE64 != ''
              run: |
                  security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build-signing.keychain-db
                  security set-keychain-settings -lut 21600 build-signing.keychain-db
                  security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build-signing.keychain-db
                  echo "$MACOS_CERTIFICATES_P12_BASE64" | base64 -D > certificates.p12
                  security import certificates.p12 \
                    -k build-signing.keychain-db \
                    -P "$MACOS_CERTIFICATES_PASSWORD" \
                    -T /usr/bin/codesign \
                    -T /usr/bin/productbuild
                  security list-keychains -d user -s build-signing.keychain-db login.keychain-db
                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" build-signing.keychain-db
                  security find-identity -v -p codesigning build-signing.keychain-db
                  security find-identity -v -p basic build-signing.keychain-db

            - name: Build macOS package
              run: |
                  ./packaging/macos/build-pkg.sh \
                    --binary dist/macos/bears-acp-adapter \
                    --output dist/macos/bears-acp-adapter-aarch64-apple-darwin.pkg

            - name: Prepare App Store Connect API key
              if: env.APP_STORE_CONNECT_API_KEY_BASE64 != ''
              run: |
                  echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -D > app-store-connect-api-key.p8
                  chmod 600 app-store-connect-api-key.p8
                  echo "APP_STORE_CONNECT_API_KEY_PATH=$PWD/app-store-connect-api-key.p8" >> "$GITHUB_ENV"

            - name: Notarize and staple macOS package
              if: env.APP_STORE_CONNECT_API_KEY_BASE64 != '' && env.MACOS_INSTALLER_CERT_IDENTITY != ''
              run: ./packaging/macos/notarize.sh --pkg dist/macos/bears-acp-adapter-aarch64-apple-darwin.pkg

            - name: Select public update channel
              if: github.event_name == 'release'
              run: |
                  if [ "${{ github.event.release.prerelease }}" = "true" ]; then
                    echo "UPDATE_CHANNEL=beta" >> "$GITHUB_ENV"
                  else
                    echo "UPDATE_CHANNEL=stable" >> "$GITHUB_ENV"
                  fi

            - name: Generate public update payload
              if: github.event_name == 'release'
              run: |
                  mkdir -p "dist/update-site/bears-acp-adapter/$UPDATE_CHANNEL"
                  cp dist/macos/bears-acp-adapter-aarch64-apple-darwin.pkg "dist/update-site/bears-acp-adapter/$UPDATE_CHANNEL/bears-acp-adapter-aarch64-apple-darwin.pkg"
                  ./packaging/macos/generate-update-manifest.sh \
                    --pkg "dist/update-site/bears-acp-adapter/$UPDATE_CHANNEL/bears-acp-adapter-aarch64-apple-darwin.pkg" \
                    --output "dist/update-site/bears-acp-adapter/$UPDATE_CHANNEL/aarch64-apple-darwin.json" \
                    --base-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/bears-acp-adapter/$UPDATE_CHANNEL" \
                    --channel "$UPDATE_CHANNEL" \
                    --target aarch64-apple-darwin \
                    --release-notes-url "${{ github.event.release.html_url }}"

            - name: Upload public update payload artifact
              if: github.event_name == 'release'
              uses: actions/upload-artifact@v4
              with:
                  name: bears-acp-adapter-update-site
                  path: dist/update-site
                  if-no-files-found: error

            - name: Upload macOS package artifact
              uses: actions/upload-artifact@v4
              with:
                  name: bears-acp-adapter-aarch64-apple-darwin-pkg
                  path: dist/macos/bears-acp-adapter-aarch64-apple-darwin.pkg
                  if-no-files-found: error

            - name: Attach macOS package to GitHub release
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist/macos/bears-acp-adapter-aarch64-apple-darwin.pkg
                      dist/update-site/bears-acp-adapter/${{ env.UPDATE_CHANNEL }}/aarch64-apple-darwin.json

    publish-update-site:
        name: Publish ACP adapter update site
        runs-on: ubuntu-24.04
        needs: macos-pkg
        if: github.event_name == 'release'

        steps:
            - name: Download public update payload
              uses: actions/download-artifact@v4
              with:
                  name: bears-acp-adapter-update-site
                  path: dist/update-site

            - name: Publish to gh-pages branch
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: dist/update-site
                  publish_branch: gh-pages
                  keep_files: true
