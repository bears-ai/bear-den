name: ACP Adapter – build & release

on:
  push:
    tags:
      - 'bears-acp-adapter/v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            musl: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: ${{ matrix.musl }}
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --manifest-path tools/bears-acp-adapter/Cargo.toml --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="tools/bears-acp-adapter/target/${{ matrix.target }}/release/bears-acp-adapter"
          strip "$BIN" || true
          tar -czf "bears-acp-adapter-${{ matrix.target }}.tar.gz" \
            -C "$(dirname "$BIN")" "$(basename "$BIN")"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "tools\bears-acp-adapter\target\${{ matrix.target }}\release\bears-acp-adapter.exe"
          Compress-Archive -Path $bin -DestinationPath "bears-acp-adapter-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: bears-acp-adapter-${{ matrix.target }}
          path: bears-acp-adapter-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Print SHA256 sums (for Homebrew formula)
        run: sha256sum artifacts/*

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
