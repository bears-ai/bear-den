name: Coolify deploy

on:
    push:
        branches: [main]
        paths:
            - "docker-compose.yaml"
            - ".github/workflows/coolify-deploy.yml"
            - ".github/workflows/den-image.yml"
            - ".github/workflows/codepool-image.yml"
            - "services/den/**"
            - "services/codepool/**"
            - "services/bifrost/**"
            - "services/letta/**"
            - "services/memfs-manager/**"
            - "services/preflight/**"
    workflow_dispatch:

permissions:
    actions: read
    contents: read

concurrency:
    group: coolify-deploy-main
    cancel-in-progress: true

jobs:
    wait-for-images:
        name: Wait for image builds
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v4
              if: github.event_name == 'push'
              with:
                  fetch-depth: 0

            - name: Wait for Den and Codepool image workflows
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
                  SHA: ${{ github.sha }}
                  BEFORE: ${{ github.event.before }}
                  EVENT_NAME: ${{ github.event_name }}
              run: |
                  set -euo pipefail

                  den_needed=false
                  codepool_needed=false

                  if [ "${EVENT_NAME}" = "push" ]; then
                    if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
                      git diff-tree --no-commit-id --name-only -r "${SHA}" > changed-files.txt
                    else
                      git diff --name-only "${BEFORE}" "${SHA}" > changed-files.txt
                    fi

                    echo "Changed files:"
                    cat changed-files.txt

                    while IFS= read -r file; do
                      case "${file}" in
                        services/den/*|.github/workflows/den-image.yml)
                          den_needed=true
                          ;;
                        services/codepool/*|.github/workflows/codepool-image.yml)
                          codepool_needed=true
                          ;;
                      esac
                    done < changed-files.txt
                  else
                    echo "Manual deploy requested; not waiting for image workflows."
                  fi

                  wait_for_workflow() {
                    local workflow_file="$1"
                    local label="$2"
                    local timeout_seconds="${3:-3600}"
                    local interval_seconds="${4:-30}"
                    local elapsed_seconds=0
                    local run_id=""

                    echo "Waiting for ${label} workflow for commit ${SHA}..."

                    while [ "${elapsed_seconds}" -le "${timeout_seconds}" ]; do
                      run_id=$(gh run list \
                        --repo "${REPO}" \
                        --workflow "${workflow_file}" \
                        --commit "${SHA}" \
                        --branch main \
                        --limit 1 \
                        --json databaseId \
                        --jq '.[0].databaseId // empty')

                      if [ -n "${run_id}" ]; then
                        break
                      fi

                      sleep "${interval_seconds}"
                      elapsed_seconds=$((elapsed_seconds + interval_seconds))
                    done

                    if [ -z "${run_id}" ]; then
                      echo "Expected ${label} workflow run for this commit, but none was found."
                      exit 1
                    fi

                    echo "Found ${label} workflow run ${run_id}; waiting for completion..."
                    gh run watch "${run_id}" --repo "${REPO}" --exit-status --interval "${interval_seconds}"
                  }

                  if [ "${den_needed}" = "true" ]; then
                    wait_for_workflow den-image.yml "Den image"
                  else
                    echo "Den image workflow not needed for this push."
                  fi

                  if [ "${codepool_needed}" = "true" ]; then
                    wait_for_workflow codepool-image.yml "Codepool image"
                  else
                    echo "Codepool image workflow not needed for this push."
                  fi

    deploy:
        name: Trigger Coolify deploy
        runs-on: ubuntu-24.04
        needs: wait-for-images
        steps:
            - name: Trigger Coolify deploy
              env:
                  COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
                  COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
              run: |
                  set -euo pipefail

                  if [ -z "${COOLIFY_WEBHOOK}" ]; then
                    echo "COOLIFY_WEBHOOK is not configured."
                    exit 1
                  fi

                  curl -X GET "${COOLIFY_WEBHOOK}" \
                    -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
                    --fail --silent --show-error
