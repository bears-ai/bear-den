name: Codepool – build & push image
# Same pattern as den-image.yml — GHCR image build only. Coolify deploys are coordinated by coolify-deploy.yml.

on:
    push:
        branches: [main]
        paths:
            - "services/codepool/**"
            - ".github/workflows/codepool-image.yml"
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    # IMAGE_NAME is set in the job (GHCR requires lowercase repository paths).

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4

            - name: Set image name (GHCR requires lowercase)
              run: |
                  owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
                  echo "IMAGE_NAME=${owner_lc}/codepool" >> "$GITHUB_ENV"

            - uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha,prefix=
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: services/codepool
                  push: true
                  platforms: linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      CODEPOOL_GIT_SHA=${{ github.sha }}
                  # Keep a registry cache as primary resilience against intermittent GHA cache 5xx.
                  # GHA cache export is best-effort (`ignore-error=true`) to avoid failing successful builds.
                  cache-from: |
                      type=gha,scope=codepool-image
                      type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
                  cache-to: |
                      type=gha,scope=codepool-image,mode=max,ignore-error=true
                      type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
