services:
  letta:
    image: letta/letta:latest
    ports:
      - "8283:8283"
    environment:
      - ONYX_URL=http://onyx-api-server:8080
      - LLM_API_URL=http://litellm:4000/v1
      - MODEL_NAME=gpt-4
      - LETTA_SERVER_PASS=${LETTA_API_KEY}
      - LETTA_SERVER_PORT=8283
      - OPENAI_API_KEY=${OPENAI_API_KEY}  # For embeddings
    depends_on:
      onyx-api-server:
        condition: service_started
      litellm:
        condition: service_healthy
    volumes:
      - letta_data:/root/.letta
    networks:
      - letta_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8283/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  onyx-api-server:
    image: onyxdotapp/onyx-backend:latest
    ports:
      - "18080:8080"
    environment:
      - POSTGRES_HOST=onyx-db
      - REDIS_HOST=onyx-cache
      - REDIS_PORT=6379
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=onyx
      - QDRANT_HOST=qdrant
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AUTH_TYPE=disabled
    depends_on:
      onyx-migrate:
        condition: service_healthy
      onyx-cache:
        condition: service_healthy
      onyx-db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./memories:/app/memories
      - ./history:/app/history
      - ./projects:/app/projects
    networks:
      - letta_net
    restart: unless-stopped
    command: ["/bin/sh", "-c", "echo 'Starting Onyx Api Server' && uvicorn onyx.main:app --host 0.0.0.0 --port 8080"]


  onyx-migrate:
    image: onyxdotapp/onyx-backend:latest
    # Run migrations, create a marker file on success, then stay running so
    # the service can report healthy and `onyx-api-server` can wait for it.
    command: /bin/sh -c "alembic upgrade head && touch /var/run/onyx_migrations_done && tail -f /dev/null"
    environment:
      - POSTGRES_HOST=onyx-db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=onyx
      - REDIS_HOST=onyx-cache
      - QDRANT_HOST=qdrant
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/onyx_migrations_done"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      onyx-db:
        condition: service_healthy
      onyx-cache:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: "no"
    networks:
      - letta_net


  onyx-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=onyx
    volumes:
      - onyx_db_data:/var/lib/postgresql/data
    networks:
      - letta_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  onyx-cache:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - letta_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - letta_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3"]
      # test: ["CMD", "curl", "-fsS", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  litellm:
    build:
      context: ./docker/litellm
    image: litellm:local  # Build locally so the gateway runs natively on ARM hosts
    ports:
      - "4000:4000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LITELLM_MODEL_NAME=openai/gpt-4
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - PORT=4000
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - letta_net
    restart: unless-stopped
    healthcheck:  # Defines the health check configuration for the container
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 http://localhost:4000/health/liveliness || exit 1" ]  # Command to execute for health check
      interval: 30s  # Perform health check every 30 seconds
      timeout: 10s   # Health check command times out after 10 seconds
      retries: 3     # Retry up to 3 times if health check fails
      start_period: 40s  # Wait 40 seconds after container start before beginning health checks

volumes:
  qdrant_data:
  letta_data:
  onyx_db_data:
  redis_data:

networks:
  letta_net:
    driver: bridge
